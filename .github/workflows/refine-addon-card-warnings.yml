name: Refine Addon Card Warnings

on:
  push:
    branches:
      - agent/refine-addon-card-warnings
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  update-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/refine-addon-card-warnings

      - name: Move server-sensitive warnings into details
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          js_path = Path("assets/addon-catalog.js")
          js = js_path.read_text(encoding="utf-8")
          pattern = r'\n      if \(compatibility\.serverSensitive\) \{\n        return make\("span", "addon-badge addon-badge-warning", "! Server-sensitive behavior"\);\n      \}'
          js, count = re.subn(pattern, "", js, count=1)
          if count == 0 and '"! Server-sensitive behavior"' in js:
              raise SystemExit("Could not remove the server-sensitive headline badge")
          js_path.write_text(js, encoding="utf-8")

          html_path = Path("guides/addons.html")
          html = html_path.read_text(encoding="utf-8")
          html = html.replace("20260723-chatter-v1", "20260723-card-warnings-v1")
          html_path.write_text(html, encoding="utf-8")

          test_path = Path("tests/addon-browser-smoke.cjs")
          test = test_path.read_text(encoding="utf-8")
          search_line = '    assert.equal(await desktop.locator(".addon-card h2").first().textContent(), "Chatter");\n'
          search_checks = search_line + '''    const chatterCard = desktop.locator('.addon-card[data-addon-id="chatter"]');
              assert.equal(await chatterCard.locator(".addon-badge-warning").count(), 0, "Server-sensitive warning should stay out of the card headline");
              assert.equal(await chatterCard.locator(".addon-card-tag").first().textContent(), "Chat Enhancement");
          '''
          search_checks = search_checks.replace("              ", "    ")
          if "Server-sensitive warning should stay out of the card headline" not in test:
              if search_line not in test:
                  raise SystemExit("Could not find Chatter search assertion")
              test = test.replace(search_line, search_checks, 1)

          detail_line = '    assert.match(chatterText, /Alt Linking/);\n'
          if 'assert.match(chatterText, /Server-sensitive/);' not in test:
              if detail_line not in test:
                  raise SystemExit("Could not find Chatter details assertion")
              test = test.replace(detail_line, detail_line + '    assert.match(chatterText, /Server-sensitive/);\n', 1)
          test_path.write_text(test, encoding="utf-8")
          PY

      - name: Validate catalog and search
        run: |
          python scripts/validate-addon-catalog.py
          python scripts/build-addon-catalog.py --check
          node tests/addon-search.test.js
          git diff --check

      - name: Install browser test tooling
        run: |
          npm init -y >/dev/null 2>&1
          npm install --no-save playwright@1.55.0 >/dev/null 2>&1
          npx playwright install chromium >/dev/null

      - name: Run browser smoke tests
        run: |
          python -m http.server 4173 >/tmp/addon-server.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID' EXIT
          sleep 2
          node tests/addon-browser-smoke.cjs

      - name: Commit tested changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/addon-catalog.js guides/addons.html tests/addon-browser-smoke.cjs
          if git diff --cached --quiet; then
            echo "No permanent changes to commit."
          else
            git commit -m "Move server-sensitive warnings into addon details"
            git push origin HEAD:agent/refine-addon-card-warnings
          fi
