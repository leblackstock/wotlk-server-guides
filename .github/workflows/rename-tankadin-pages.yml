name: Rename Tankadin pages

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: write
  pull-requests: read

jobs:
  rename:
    if: github.head_ref == 'rename-tankadin-building-equipping'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Rename page titles and navigation
        run: |
          python3 - <<'PY'
          from pathlib import Path
          from html.parser import HTMLParser

          guide_pages = [
              Path('guides/protection-paladin-pve-guide.html'),
              Path('guides/protection-paladin-playing.html'),
              Path('guides/protection-paladin-setting-up.html'),
              Path('guides/protection-paladin-gearing.html'),
              Path('guides/protection-paladin-gear-targets.html'),
              Path('guides/protection-paladin-raiding.html'),
          ]

          def replace(path, old, new, expected=None):
              text = path.read_text(encoding='utf-8')
              count = text.count(old)
              if expected is not None and count != expected:
                  raise SystemExit(f'{path}: expected {expected} occurrence(s) of {old!r}, found {count}')
              if count == 0:
                  raise SystemExit(f'{path}: missing required text {old!r}')
              path.write_text(text.replace(old, new), encoding='utf-8')

          for path in guide_pages:
              replace(path, '>Gearing</a>', '>Building</a>', 1)
              replace(path, '>Gear targets</a>', '>Equipping</a>', 1)

          quick = guide_pages[0]
          replace(quick, 'Gearing your Tankadin</h3>', 'Building your Tankadin</h3>', 1)
          replace(quick, 'Tankadin Gear Targets</h3>', 'Equipping your Tankadin</h3>', 1)

          setup = guide_pages[2]
          replace(setup, 'Gearing your Tankadin →', 'Building your Tankadin →', 1)

          building = guide_pages[3]
          replace(building, '<title>Gearing your Tankadin', '<title>Building your Tankadin', 1)
          replace(building, '<span>Gearing your Tankadin</span>', '<span>Building your Tankadin</span>', 1)
          replace(building, 'Tankadin Gear Targets', 'Equipping your Tankadin', 3)

          equipping = guide_pages[4]
          replace(equipping, '<title>Tankadin Gear Targets', '<title>Equipping your Tankadin', 1)
          replace(equipping, '<span>Tankadin Gear Targets</span>', '<span>Equipping your Tankadin</span>', 1)
          replace(equipping, '← Gearing fundamentals', '← Building your Tankadin', 1)

          raiding = guide_pages[5]
          replace(raiding, '← Specific gear targets', '← Equipping your Tankadin', 1)

          hub = Path('index.html')
          replace(hub, 'Playing, Setting Up, Gearing, Gear Targets, and Raiding', 'Playing, Setting Up, Building, Equipping, and Raiding', 1)
          replace(hub, '<span class="guide-title">Tankadin Gear Targets</span>', '<span class="guide-title">Equipping your Tankadin</span>', 1)

          trigger = Path('.github/rename-tankadin-pages.trigger')
          if trigger.exists():
              trigger.unlink()

          expected_nav = [
              'Quick Start', 'Playing', 'Setting up', 'Building', 'Equipping', 'Raiding'
          ]
          for path in guide_pages:
              text = path.read_text(encoding='utf-8')
              for label in expected_nav:
                  if text.count(f'>{label}</a>') != 1:
                      raise SystemExit(f'{path}: navigation label {label!r} missing or duplicated')
              if '>Gearing</a>' in text or '>Gear targets</a>' in text:
                  raise SystemExit(f'{path}: old navigation labels remain')

          checks = {
              quick: ['Building your Tankadin</h3>', 'Equipping your Tankadin</h3>'],
              building: ['<title>Building your Tankadin', '<span>Building your Tankadin</span>', 'Equipping your Tankadin →'],
              equipping: ['<title>Equipping your Tankadin', '<span>Equipping your Tankadin</span>', '← Building your Tankadin'],
              raiding: ['← Equipping your Tankadin'],
              hub: ['Building, Equipping, and Raiding', '<span class="guide-title">Equipping your Tankadin</span>'],
          }
          for path, needles in checks.items():
              text = path.read_text(encoding='utf-8')
              for needle in needles:
                  if needle not in text:
                      raise SystemExit(f'{path}: validation text missing: {needle!r}')

          class LinkParser(HTMLParser):
              def __init__(self):
                  super().__init__()
                  self.hrefs = []
              def handle_starttag(self, tag, attrs):
                  if tag == 'a':
                      href = dict(attrs).get('href')
                      if href:
                          self.hrefs.append(href)

          for path in guide_pages + [hub]:
              parser = LinkParser()
              parser.feed(path.read_text(encoding='utf-8'))
              for href in parser.hrefs:
                  if href.startswith(('http://', 'https://', '#', 'mailto:')):
                      continue
                  target = href.split('#', 1)[0]
                  if not target:
                      continue
                  resolved = (path.parent / target).resolve()
                  if not resolved.exists():
                      raise SystemExit(f'{path}: broken local link {href}')

          print('Tankadin title rename and link validation passed.')
          PY

      - name: Commit renamed pages
        run: |
          if git diff --quiet; then
            echo 'No changes to commit.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add guides/protection-paladin-*.html index.html .github/rename-tankadin-pages.trigger
          git commit -m 'Rename Tankadin building and equipping pages'
          git push origin HEAD:${{ github.head_ref }}
