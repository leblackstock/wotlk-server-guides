name: Integrate Protection Paladin level-80 progression

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize]

permissions:
  contents: write

jobs:
  integrate:
    if: github.head_ref == 'integrate-protection-paladin-level80-advanced'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Patch and validate guide
        run: python .github/scripts/integrate_ppala_level80.py
      - name: Commit guide only
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .github/tmp/ppala-level80
          rm -f .github/scripts/integrate_ppala_level80.py
          rm -f .github/workflows/integrate-protection-paladin-level80-advanced.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add guides/protection-paladin-pve-guide.html .github
          git diff --cached --check
          git commit -m "Expand Protection Paladin level-80 progression"
          git push origin HEAD:${{ github.head_ref }}
