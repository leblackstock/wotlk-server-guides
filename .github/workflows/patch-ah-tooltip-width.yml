name: Patch AH tooltip width

on:
  push:
    branches:
      - agent/narrow-ah-mobile-tooltip

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/narrow-ah-mobile-tooltip
          fetch-depth: 0

      - name: Narrow mobile tooltip and refresh cache
        run: |
          python - <<'PY'
          from pathlib import Path

          tooltip = Path("assets/ah-item-tooltips.js")
          text = tooltip.read_text(encoding="utf-8")
          replacements = [
              ("max-width: calc(100vw - 68px) !important;", "max-width: calc(100vw - 88px) !important;", 2),
              ("max-width: 320px !important;", "max-width: 300px !important;", 1),
              ("width: calc(100vw - 76px) !important;", "width: calc(100vw - 96px) !important;", 1),
          ]
          for old, new, expected in replacements:
              count = text.count(old)
              if count != expected:
                  raise SystemExit(f"Expected {expected} occurrence(s) of {old!r}, found {count}")
              text = text.replace(old, new)
          tooltip.write_text(text, encoding="utf-8")

          loader = Path("assets/ah-search.js")
          text = loader.read_text(encoding="utf-8")
          old = "ah-item-tooltips.js?v=20260722-ah-mobile-v2"
          new = "ah-item-tooltips.js?v=20260723-ah-mobile-v3"
          if text.count(old) != 1:
              raise SystemExit("Expected tooltip cache key was not found exactly once")
          loader.write_text(text.replace(old, new, 1), encoding="utf-8")
          PY

      - name: Validate JavaScript
        run: |
          node --check assets/ah-item-tooltips.js
          node --check assets/ah-search.js

      - name: Commit focused fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/patch-ah-tooltip-width.yml
          git add assets/ah-item-tooltips.js assets/ah-search.js
          git commit -m "fix: keep AH mobile tooltips inside viewport"
          git push origin HEAD:agent/narrow-ah-mobile-tooltip
