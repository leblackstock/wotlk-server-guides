name: Remove Central Addon Note

on:
  push:
    branches:
      - agent/remove-central-addon-note

permissions:
  contents: write

jobs:
  edit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/remove-central-addon-note
          fetch-depth: 0
      - name: Remove note
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('guides/protection-paladin-setting-up.html')
          text = path.read_text(encoding='utf-8')
          line = '  <div class="note paladin"><strong>Central addon catalog:</strong> The Addon Library now owns the full setup notes, limitations, compatibility warnings, and download links. The shortlist below opens each entry with Protection Paladin context already selected.</div>\n'
          count = text.count(line)
          if count == 1:
              path.write_text(text.replace(line, '', 1), encoding='utf-8')
          elif count == 0:
              print('Note is already absent.')
          else:
              raise SystemExit(f'Expected one matching note, found {count}.')
          PY
          git diff --check
          ! grep -Fq 'Central addon catalog:' guides/protection-paladin-setting-up.html
      - name: Commit HTML change
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add guides/protection-paladin-setting-up.html
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Remove central addon catalog note"
          git push
