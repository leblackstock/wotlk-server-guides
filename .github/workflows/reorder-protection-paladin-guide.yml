name: Reorder Protection Paladin guide

on:
  pull_request:
    branches:
      - main
    types:
      - synchronize

permissions:
  contents: write

jobs:
  reorder:
    if: github.head_ref == 'reorder-protection-paladin-learning-path'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Diagnose current guide structure
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import re

          path = Path('guides/protection-paladin-pve-guide.html')
          text = path.read_text(encoding='utf-8')
          desired = [
              'quick-start', 'rotation', 'cooldowns', 'stats', 'talents', 'glyphs',
              'macros', 'addons', 'gems', 'enchants', 'professions', 'consumables',
              'corrections', 'sources',
          ]

          report = []
          report.append(f'file_bytes={len(text.encode("utf-8"))}')
          report.append(f'footer_found={"  <footer>" in text}')
          report.append(f'sources_heading_found={"Sources and scope" in text}')

          for key in desired:
              if key == 'corrections':
                  marker = '  <details class="common correction-section" id="corrections">'
              elif key == 'sources':
                  heading = text.find('Sources and scope')
                  position = text.rfind('  <section class="common">', 0, heading) if heading >= 0 else -1
                  report.append(f'{key}={position}')
                  continue
              else:
                  marker = f'  <section class="common" id="{key}">'
              report.append(f'{key}={text.find(marker)}')

          nav = re.search(
              r'    <div class="jump-nav" aria-label="Page sections">\n(?P<body>.*?)    </div>',
              text,
              re.S,
          )
          report.append(f'nav_found={bool(nav)}')
          if nav:
              hrefs = re.findall(r'href="#([^"]+)"', nav.group('body'))
              report.append('nav_hrefs=' + ','.join(hrefs))

          top_level = re.findall(
              r'^  <(?:section class="common"[^>]*|details class="common correction-section"[^>]*)>',
              text,
              re.M,
          )
          report.append('top_level_markers:')
          report.extend(top_level)

          Path('.tmp/reorder-diagnostic.txt').write_text('\n'.join(report) + '\n', encoding='utf-8')
          PY

      - name: Commit diagnostic
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .tmp/reorder-diagnostic.txt
          git commit -m "Record Protection guide reorder diagnostics"
          git push origin HEAD:${{ github.head_ref }}
