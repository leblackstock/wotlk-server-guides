name: Reorder Protection Paladin guide

on:
  pull_request:
    branches:
      - main
    types:
      - synchronize

permissions:
  contents: write

jobs:
  reorder:
    if: github.head_ref == 'reorder-protection-paladin-learning-path'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Reorder guide sections
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import re

          path = Path('guides/protection-paladin-pve-guide.html')
          text = path.read_text(encoding='utf-8')

          desired = [
              'quick-start',
              'rotation',
              'cooldowns',
              'stats',
              'talents',
              'glyphs',
              'macros',
              'addons',
              'gems',
              'enchants',
              'professions',
              'consumables',
              'corrections',
              'sources',
          ]

          markers = {
              'quick-start': '  <section class="common" id="quick-start">',
              'rotation': '  <section class="common" id="rotation">',
              'cooldowns': '  <section class="common" id="cooldowns">',
              'stats': '  <section class="common" id="stats">',
              'talents': '  <section class="common" id="talents">',
              'glyphs': '  <section class="common" id="glyphs">',
              'macros': '  <section class="common" id="macros">',
              'addons': '<section class="common" id="addons">',
              'gems': '  <section class="common" id="gems">',
              'enchants': '  <section class="common" id="enchants">',
              'professions': '  <section class="common" id="professions">',
              'consumables': '  <section class="common" id="consumables">',
              'corrections': '  <details class="common correction-section" id="corrections">',
          }

          source_heading = text.index('Sources and scope')
          source_start = text.rfind('  <section class="common">', 0, source_heading)
          footer_start = text.index('  <footer>')
          if source_start < 0:
              raise SystemExit('Sources section start not found')

          starts = {key: text.index(marker) for key, marker in markers.items()}
          starts['sources'] = source_start
          if len(set(starts.values())) != len(starts):
              raise SystemExit('Duplicate section positions found')

          ordered_positions = sorted((position, key) for key, position in starts.items())
          blocks = {}
          for index, (start, key) in enumerate(ordered_positions):
              end = ordered_positions[index + 1][0] if index + 1 < len(ordered_positions) else footer_start
              blocks[key] = text[start:end]

          first_section = ordered_positions[0][0]
          text = text[:first_section] + ''.join(blocks[key] for key in desired) + text[footer_start:]

          nav = re.search(
              r'(?P<open>    <div class="jump-nav" aria-label="Page sections">\n)'
              r'(?P<body>.*?)'
              r'(?P<close>    </div>)',
              text,
              re.S,
          )
          if not nav:
              raise SystemExit('Jump navigation not found')

          full_lines = re.findall(r'      <a href="#[^"]+">.*?</a>\n', nav.group('body'))
          link_map = {
              re.search(r'href="#([^"]+)"', line).group(1): line
              for line in full_lines
          }
          nav_order = [
              'quick-start',
              'rotation',
              'cooldowns',
              'stats',
              'talents',
              'glyphs',
              'macros',
              'addons',
              'gems',
              'enchants',
              'professions',
              'consumables',
              'corrections',
          ]
          if set(link_map) != set(nav_order):
              raise SystemExit(f'Jump-nav mismatch: {list(link_map)}')
          text = text[:nav.start('body')] + ''.join(link_map[key] for key in nav_order) + text[nav.end('body'):]

          # Confirm the requested sequence, especially Rotation immediately after Quick Start.
          positions = []
          for key in desired:
              if key == 'sources':
                  heading = text.index('Sources and scope')
                  position = text.rfind('  <section class="common">', 0, heading)
              else:
                  position = text.index(markers[key])
              positions.append(position)
          if positions != sorted(positions):
              raise SystemExit('Final section order is incorrect')

          path.write_text(text, encoding='utf-8', newline='\n')
          PY

      - name: Commit reordered guide
        shell: bash
        run: |
          set -euo pipefail
          rm -f .tmp/reorder-protection-guide-trigger.txt .tmp/reorder-diagnostic.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Reorder Protection Paladin guide by learning path"
          git push origin HEAD:${{ github.head_ref }}
