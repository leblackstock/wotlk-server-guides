name: Reorder Protection Paladin guide

on:
  pull_request:
    branches:
      - main
    types:
      - opened

permissions:
  contents: write

jobs:
  reorder:
    if: github.head_ref == 'reorder-protection-paladin-learning-path'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Reorder sections without rewriting them
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import hashlib
          import re

          path = Path('guides/protection-paladin-pve-guide.html')
          text = path.read_text(encoding='utf-8')

          block_start = re.compile(
              r'^  <(?:section class="common"(?: id="[^"]+")?|details class="common correction-section" id="corrections")>',
              re.M,
          )
          starts = [m.start() for m in block_start.finditer(text)]
          footer_start = text.index('  <footer>')
          starts = [s for s in starts if s < footer_start]
          if not starts:
              raise SystemExit('No top-level guide sections found')

          boundaries = starts + [footer_start]
          blocks = {}
          original_hashes = {}
          for i, start in enumerate(starts):
              block = text[start:boundaries[i + 1]]
              id_match = re.search(r'id="([^"]+)"', block.split('\n', 1)[0])
              if id_match:
                  key = id_match.group(1)
              elif 'Sources and scope' in block:
                  key = 'sources'
              else:
                  raise SystemExit(f'Unrecognized top-level block: {block[:100]!r}')
              if key in blocks:
                  raise SystemExit(f'Duplicate section key: {key}')
              blocks[key] = block
              original_hashes[key] = hashlib.sha256(block.encode('utf-8')).hexdigest()

          desired = [
              'quick-start',
              'rotation',
              'cooldowns',
              'stats',
              'talents',
              'glyphs',
              'macros',
              'addons',
              'gems',
              'enchants',
              'professions',
              'consumables',
              'corrections',
              'sources',
          ]
          if set(blocks) != set(desired):
              raise SystemExit(f'Section mismatch. Found {list(blocks)}, expected {desired}')

          reordered = text[:starts[0]] + ''.join(blocks[key] for key in desired) + text[footer_start:]

          nav_match = re.search(
              r'(?P<open>    <div class="jump-nav" aria-label="Page sections">\n)'
              r'(?P<body>.*?)'
              r'(?P<close>    </div>)',
              reordered,
              re.S,
          )
          if not nav_match:
              raise SystemExit('Jump navigation not found')

          link_lines = re.findall(r'      <a href="#([^"]+)">.*?</a>\n', nav_match.group('body'))
          full_lines = re.findall(r'      <a href="#[^"]+">.*?</a>\n', nav_match.group('body'))
          if len(link_lines) != len(full_lines):
              raise SystemExit('Could not parse jump navigation links')
          link_map = dict(zip(link_lines, full_lines))
          nav_order = [
              'quick-start', 'rotation', 'cooldowns', 'stats', 'talents', 'glyphs',
              'macros', 'addons', 'gems', 'enchants', 'professions', 'consumables',
              'corrections',
          ]
          if set(link_map) != set(nav_order):
              raise SystemExit(f'Jump-nav mismatch. Found {list(link_map)}, expected {nav_order}')
          new_nav_body = ''.join(link_map[key] for key in nav_order)
          reordered = (
              reordered[:nav_match.start('body')]
              + new_nav_body
              + reordered[nav_match.end('body'):]
          )

          # Re-extract and prove every section's contents stayed byte-for-byte unchanged.
          new_starts = [m.start() for m in block_start.finditer(reordered)]
          new_footer = reordered.index('  <footer>')
          new_starts = [s for s in new_starts if s < new_footer]
          new_boundaries = new_starts + [new_footer]
          new_keys = []
          for i, start in enumerate(new_starts):
              block = reordered[start:new_boundaries[i + 1]]
              id_match = re.search(r'id="([^"]+)"', block.split('\n', 1)[0])
              key = id_match.group(1) if id_match else 'sources'
              new_keys.append(key)
              digest = hashlib.sha256(block.encode('utf-8')).hexdigest()
              if digest != original_hashes[key]:
                  raise SystemExit(f'Section content changed unexpectedly: {key}')

          if new_keys != desired:
              raise SystemExit(f'Final section order incorrect: {new_keys}')

          path.write_text(reordered, encoding='utf-8', newline='\n')
          PY

          rm -f .tmp/reorder-protection-guide-trigger.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Reorder Protection Paladin guide by learning path"
          git push origin HEAD:${{ github.head_ref }}
