name: Reorder Protection Paladin guide

on:
  pull_request:
    branches:
      - main
    types:
      - synchronize

permissions:
  contents: write

jobs:
  reorder:
    if: github.head_ref == 'reorder-protection-paladin-learning-path'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Reorder sections without rewriting them
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import hashlib
          import re

          path = Path('guides/protection-paladin-pve-guide.html')
          text = path.read_text(encoding='utf-8')
          footer_start = text.index('  <footer>')

          desired = [
              'quick-start',
              'rotation',
              'cooldowns',
              'stats',
              'talents',
              'glyphs',
              'macros',
              'addons',
              'gems',
              'enchants',
              'professions',
              'consumables',
              'corrections',
              'sources',
          ]

          markers = {
              key: f'  <section class="common" id="{key}">' for key in desired
              if key not in {'corrections', 'sources'}
          }
          markers['corrections'] = '  <details class="common correction-section" id="corrections">'

          source_heading = text.index('Sources and scope')
          source_start = text.rfind('  <section class="common">', 0, source_heading)
          if source_start < 0:
              raise SystemExit('Sources section start not found')

          starts = {}
          for key, marker in markers.items():
              position = text.find(marker)
              if position < 0:
                  raise SystemExit(f'Section marker not found: {key}')
              starts[key] = position
          starts['sources'] = source_start

          if len(set(starts.values())) != len(starts):
              raise SystemExit(f'Duplicate section positions: {starts}')

          current_order = [key for key, _ in sorted(starts.items(), key=lambda item: item[1])]
          sorted_positions = sorted((position, key) for key, position in starts.items())

          blocks = {}
          original_hashes = {}
          for index, (start, key) in enumerate(sorted_positions):
              end = sorted_positions[index + 1][0] if index + 1 < len(sorted_positions) else footer_start
              block = text[start:end]
              blocks[key] = block
              original_hashes[key] = hashlib.sha256(block.encode('utf-8')).hexdigest()

          first_section = min(starts.values())
          reordered = text[:first_section] + ''.join(blocks[key] for key in desired) + text[footer_start:]

          nav_match = re.search(
              r'(?P<open>    <div class="jump-nav" aria-label="Page sections">\n)'
              r'(?P<body>.*?)'
              r'(?P<close>    </div>)',
              reordered,
              re.S,
          )
          if not nav_match:
              raise SystemExit('Jump navigation not found')

          hrefs = re.findall(r'      <a href="#([^"]+)">.*?</a>\n', nav_match.group('body'))
          lines = re.findall(r'      <a href="#[^"]+">.*?</a>\n', nav_match.group('body'))
          link_map = dict(zip(hrefs, lines))
          nav_order = [
              'quick-start', 'rotation', 'cooldowns', 'stats', 'talents', 'glyphs',
              'macros', 'addons', 'gems', 'enchants', 'professions', 'consumables',
              'corrections',
          ]
          if set(link_map) != set(nav_order):
              raise SystemExit(f'Jump-nav mismatch. Found {list(link_map)}, expected {nav_order}')

          new_nav_body = ''.join(link_map[key] for key in nav_order)
          reordered = reordered[:nav_match.start('body')] + new_nav_body + reordered[nav_match.end('body'):]

          # Confirm all section blocks remain byte-for-byte unchanged.
          verify_starts = {}
          for key, marker in markers.items():
              verify_starts[key] = reordered.index(marker)
          verify_source_heading = reordered.index('Sources and scope')
          verify_starts['sources'] = reordered.rfind('  <section class="common">', 0, verify_source_heading)
          verify_footer = reordered.index('  <footer>')
          verify_positions = sorted((position, key) for key, position in verify_starts.items())
          final_order = [key for _, key in verify_positions]
          if final_order != desired:
              raise SystemExit(f'Final section order incorrect: {final_order}')

          for index, (start, key) in enumerate(verify_positions):
              end = verify_positions[index + 1][0] if index + 1 < len(verify_positions) else verify_footer
              digest = hashlib.sha256(reordered[start:end].encode('utf-8')).hexdigest()
              if digest != original_hashes[key]:
                  raise SystemExit(f'Section content changed unexpectedly: {key}')

          path.write_text(reordered, encoding='utf-8', newline='\n')
          print('Previous order:', ' -> '.join(current_order))
          print('New order:', ' -> '.join(desired))
          PY

          rm -f .tmp/reorder-protection-guide-trigger.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Reorder Protection Paladin guide by learning path"
          git push origin HEAD:${{ github.head_ref }}
