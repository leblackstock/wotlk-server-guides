name: Addon Context Facet Audit

on:
  push:
    branches:
      - agent/addon-context-inference
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  test-and-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref || github.ref_name }}
      - name: Apply specialization facet patch
        run: |
          if grep -q 'function isMeaningfulOption' assets/addon-catalog.js; then
            echo "Specialization facet patch already applied."
          else
            python3 scripts/patch-addon-specialization-facets.py
          fi
      - name: Validate static catalog
        run: |
          python3 scripts/build-addon-catalog.py
          python3 scripts/validate-addon-catalog.py
          python3 scripts/build-addon-catalog.py --check
          python3 scripts/build-ah-search-index.py --check
          node tests/addon-search.test.js
          git diff --check
      - name: Install temporary browser test tooling
        run: |
          npm install --prefix /tmp/addon-facet-browser playwright@1.54.1
          npx --prefix /tmp/addon-facet-browser playwright install --with-deps chromium
      - name: Run browser smoke tests
        env:
          NODE_PATH: /tmp/addon-facet-browser/node_modules
        run: |
          python3 -m http.server 4173 >/tmp/addon-facet-http.log 2>&1 &
          SERVER_PID=$!
          trap 'kill "$SERVER_PID" 2>/dev/null || true' EXIT
          sleep 2
          node tests/addon-browser-smoke.cjs
      - name: Commit tested permanent changes
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/addon-catalog.js tests/addon-search.test.js tests/addon-browser-smoke.cjs
          if git diff --cached --quiet; then
            echo "No permanent changes to commit."
            exit 0
          fi
          git commit -m "Limit addon specs to targeted contexts"
          git push
