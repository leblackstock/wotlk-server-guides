name: Finalize Protection Paladin guide

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  finalize:
    if: github.head_ref == 'polish-protection-paladin-guide'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: polish-protection-paladin-guide
          fetch-depth: 0
      - name: Assemble if needed and verify exact guide
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import base64
          import hashlib

          target = Path('guides/protection-paladin-pve-guide.html')
          chunk_dir = Path('.tmp/protection-paladin-guide')
          parts = [chunk_dir / name for name in ('00.b64','01.b64','02.b64','04.b64','06.b64','08.b64','10.b64')]
          if all(path.exists() for path in parts):
              encoded = ''.join(path.read_text(encoding='utf-8') for path in parts)
              target.write_bytes(base64.b64decode(encoded, validate=True))
          data = target.read_bytes()
          actual = hashlib.sha1(f'blob {len(data)}\0'.encode() + data).hexdigest()
          expected = '3e451952b5a12309251b4f72cae85c8d3c9865d1'
          print(f'actual={actual}')
          print(f'expected={expected}')
          print(f'bytes={len(data)}')
          if actual != expected:
              raise SystemExit('guide hash mismatch')
          PY
          rm -rf .tmp/protection-paladin-guide
          rm -f .github/workflows/assemble-protection-paladin-guide.yml
          rm -f .github/workflows/assemble-protection-paladin-guide-v2.yml
          rm -f .github/workflows/finalize-protection-paladin-guide.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "Polish Protection Paladin guide"
            git push
          fi
      - name: Verify final scope and merge
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          changed="$(git diff --name-only origin/main...HEAD)"
          printf 'Changed files:\n%s\n' "$changed"
          test "$changed" = "guides/protection-paladin-pve-guide.html"
          test ! -e .tmp/protection-paladin-guide
          test ! -e .github/workflows/assemble-protection-paladin-guide.yml
          test ! -e .github/workflows/assemble-protection-paladin-guide-v2.yml
          test ! -e .github/workflows/finalize-protection-paladin-guide.yml
          gh pr merge 2 --repo leblackstock/wotlk-server-guides --squash --delete-branch
