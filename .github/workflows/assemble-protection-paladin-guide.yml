name: Assemble Protection Paladin guide

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  assemble:
    if: github.head_ref == 'polish-protection-paladin-guide'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: polish-protection-paladin-guide
      - name: Assemble and verify guide
        shell: bash
        run: |
          set -euo pipefail
          cat .tmp/protection-paladin-guide/*.b64 | base64 --decode > guides/protection-paladin-pve-guide.html
          actual="$(git hash-object guides/protection-paladin-pve-guide.html)"
          expected="3e451952b5a12309251b4f72cae85c8d3c9865d1"
          test "$actual" = "$expected"
          rm -rf .tmp/protection-paladin-guide
          rm -f .github/workflows/assemble-protection-paladin-guide.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Polish Protection Paladin guide"
          git push
