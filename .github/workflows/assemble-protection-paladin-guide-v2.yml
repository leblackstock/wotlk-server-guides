name: Assemble Protection Paladin guide v2

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  assemble:
    if: github.head_ref == 'polish-protection-paladin-guide'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: polish-protection-paladin-guide
      - name: Assemble and verify guide
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import base64
          import hashlib

          parts = [
              '.tmp/protection-paladin-guide/00.b64',
              '.tmp/protection-paladin-guide/01.b64',
              '.tmp/protection-paladin-guide/02.b64',
              '.tmp/protection-paladin-guide/04.b64',
              '.tmp/protection-paladin-guide/06.b64',
              '.tmp/protection-paladin-guide/08.b64',
              '.tmp/protection-paladin-guide/10.b64',
          ]
          encoded = ''.join(Path(path).read_text(encoding='utf-8') for path in parts)
          data = base64.b64decode(encoded, validate=True)
          target = Path('guides/protection-paladin-pve-guide.html')
          target.write_bytes(data)
          actual = hashlib.sha1(f'blob {len(data)}\0'.encode() + data).hexdigest()
          expected = '3e451952b5a12309251b4f72cae85c8d3c9865d1'
          print(f'actual={actual}')
          print(f'expected={expected}')
          print(f'bytes={len(data)}')
          if actual != expected:
              raise SystemExit('assembled guide hash mismatch')
          PY
          rm -rf .tmp/protection-paladin-guide
          rm -f .github/workflows/assemble-protection-paladin-guide.yml
          rm -f .github/workflows/assemble-protection-paladin-guide-v2.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Polish Protection Paladin guide"
          git push
