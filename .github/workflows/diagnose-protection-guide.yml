name: Diagnose Protection Paladin guide recovery

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  diagnose:
    if: github.head_ref == 'polish-protection-paladin-guide'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: polish-protection-paladin-guide
      - name: Capture recovery diagnostics
        shell: bash
        run: |
          set -u
          python - <<'PY'
          from pathlib import Path
          import base64
          import hashlib
          import traceback

          lines = []
          try:
              root = Path('.tmp/protection-paladin-guide')
              names = ['00.b64', '01.b64', '02.b64', '04.b64', '06.b64', '08.b64', '10.b64']
              for name in names:
                  path = root / name
                  raw = path.read_text(encoding='utf-8')
                  clean = ''.join(raw.split())
                  lines.append(f'{name}: raw={len(raw)} clean={len(clean)} mod4={len(clean) % 4}')
              encoded = ''.join(''.join((root / name).read_text(encoding='utf-8').split()) for name in names)
              lines.append(f'total_encoded={len(encoded)} mod4={len(encoded) % 4}')
              data = base64.b64decode(encoded)
              lines.append(f'decoded_bytes={len(data)}')
              lines.append(f'blob={hashlib.sha1(f"blob {len(data)}\\0".encode() + data).hexdigest()}')
              try:
                  text = data.decode('utf-8')
                  lines.append('utf8=ok')
                  for token in ['<!DOCTYPE html>', 'Macros: what to use, and when not to', 'Optional two-button 969 helper', '<section class="common" id="addons">', '</html>']:
                      lines.append(f'{token!r}: {token in text}')
              except Exception:
                  lines.append('utf8_error:')
                  lines.append(traceback.format_exc())
          except Exception:
              lines.append('recovery_error:')
              lines.append(traceback.format_exc())
          Path('.tmp/protection-guide-diagnostic.txt').write_text('\n'.join(lines) + '\n', encoding='utf-8')
          PY
          rm -f .github/workflows/diagnose-protection-guide.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .tmp/protection-guide-diagnostic.txt .github/workflows/diagnose-protection-guide.yml
          git commit -m "Record Paladin guide recovery diagnostics"
          git push
