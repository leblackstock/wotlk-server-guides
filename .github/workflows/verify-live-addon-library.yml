name: Verify Live Addon Library

on:
  push:
    branches:
      - agent/addon-library-20260722

permissions:
  contents: read

jobs:
  verify-live:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - name: Wait for GitHub Pages content
        shell: bash
        run: |
          set -euo pipefail
          HUB="https://leblackstock.github.io/wotlk-server-guides/index.html"
          ADDONS="https://leblackstock.github.io/wotlk-server-guides/guides/addons.html"
          for attempt in $(seq 1 48); do
            stamp="$(date +%s)-$attempt"
            hub_html="$(curl --fail --silent --show-error --location --header 'Cache-Control: no-cache' "$HUB?verify=$stamp" || true)"
            addon_html="$(curl --fail --silent --show-error --location --header 'Cache-Control: no-cache' "$ADDONS?verify=$stamp" || true)"
            if grep -q 'Addon Library' <<<"$hub_html" && grep -q 'WotLK 3.3.5 Addon Library' <<<"$addon_html"; then
              printf '%s' "$hub_html" > /tmp/live-hub.html
              printf '%s' "$addon_html" > /tmp/live-addons.html
              echo "Live Pages content is current."
              exit 0
            fi
            echo "Attempt $attempt: Pages is still serving the previous revision."
            sleep 10
          done
          echo "GitHub Pages did not publish the merged revision during the verification window." >&2
          exit 1
      - name: Install temporary browser
        run: |
          npm install --prefix /tmp/live-addon-browser playwright@1.54.1
          npx --prefix /tmp/live-addon-browser playwright install --with-deps chromium
      - name: Exercise the live catalog
        env:
          NODE_PATH: /tmp/live-addon-browser/node_modules
          ADDON_TEST_BASE: https://leblackstock.github.io/wotlk-server-guides
        run: node tests/addon-browser-smoke.cjs
      - name: Record live verification
        run: |
          {
            echo "commit=c6600f3dcfc239930f9a4d49544ced66716bbfaf"
            echo "verified_at=$(date --utc --iso-8601=seconds)"
            echo "hub=https://leblackstock.github.io/wotlk-server-guides/index.html"
            echo "addons=https://leblackstock.github.io/wotlk-server-guides/guides/addons.html"
          } > /tmp/live-verification.txt
      - uses: actions/upload-artifact@v4
        with:
          name: addon-live-verification
          path: /tmp/live-verification.txt
          retention-days: 1
