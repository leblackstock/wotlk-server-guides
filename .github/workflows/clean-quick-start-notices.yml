name: Clean Quick Start notices

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/clean-quick-start-notices.yml'

permissions:
  contents: write

jobs:
  update:
    if: github.head_ref == 'clean-quick-start-notices'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Consolidate Quick Start notices
        shell: python
        run: |
          from pathlib import Path

          path = Path('guides/protection-paladin-pve-guide.html')
          text = path.read_text(encoding='utf-8')

          old_notes = '''<div class="note paladin"><strong>Starts at level 80:</strong> This guide begins when your Paladin reaches level 80. It does not cover leveling builds or low-level dungeon progression.</div>

  <div class="note paladin"><strong>Read first:</strong> For raid bosses, reach <strong>540 Defense skill</strong> before optimizing anything else. After that, build enough health and armor to survive the next hit.</div>

  <div class="note warning"><strong>Hellscream note:</strong> Proc enchants, taunt hit rules, set bonuses, boss parry-haste, and some scripted abilities can differ. Standard 3.3.5 behavior is listed; test anything suspicious before rebuilding a set around it.</div>

'''
          if old_notes not in text:
              raise SystemExit('Expected three-note block not found')
          text = text.replace(old_notes, '', 1)

          old_detail = '535 is enough for level-82 heroic bosses. Use the character-sheet Defense skill, not a guessed rating total.'
          new_detail = '535 is enough for level-82 heroic bosses. For raid bosses, reach 540 on the character sheet, then prioritize stamina and armor.'
          if old_detail not in text:
              raise SystemExit('Raid minimum detail not found')
          text = text.replace(old_detail, new_detail, 1)

          marker = '''        <div class="summary-detail"><strong>Pattern:</strong> 9 → 6 → 9 → 6. Use <strong>1/2 Improved Judgements</strong> so Judgement fits the 9-second group cleanly.</div>
      </div>
    </div>

    <div class="two-col" style="margin-top:12px">'''
          replacement = '''        <div class="summary-detail"><strong>Pattern:</strong> 9 → 6 → 9 → 6. Use <strong>1/2 Improved Judgements</strong> so Judgement fits the 9-second group cleanly.</div>
      </div>
    </div>

    <details class="server-behavior">
      <summary><img class="ability-icon" src="https://wow.zamimg.com/images/wow/icons/large/inv_misc_wrench_01.jpg" alt="" aria-hidden="true" onerror="this.remove()"> Server behavior on Hellscream</summary>
      <p>Standard 3.3.5 behavior is used throughout the guide. Proc enchants, taunt-hit rules, set bonuses, boss parry-haste, and scripted abilities may differ on Hellscream. Test anything suspicious before rebuilding a set around it.</p>
    </details>

    <div class="two-col" style="margin-top:12px">'''
          if marker not in text:
              raise SystemExit('Quick Start insertion marker not found')
          text = text.replace(marker, replacement, 1)

          style_marker = '  <link rel="stylesheet" href="../assets/protection-paladin.css">\n'
          style = '''  <link rel="stylesheet" href="../assets/protection-paladin.css">
  <style>
    .server-behavior {
      margin-top: 12px;
      border-color: rgba(114,227,255,.20);
      background: rgba(114,227,255,.035);
    }
    .server-behavior > summary {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #d8f5ff;
      font-size: 13px;
    }
    .server-behavior > p {
      margin-bottom: 2px;
    }
  </style>
'''
          if style_marker not in text:
              raise SystemExit('Stylesheet marker not found')
          text = text.replace(style_marker, style, 1)

          path.write_text(text, encoding='utf-8', newline='\n')

      - name: Validate cleanup
        shell: python
        run: |
          from pathlib import Path
          text = Path('guides/protection-paladin-pve-guide.html').read_text(encoding='utf-8')
          forbidden = ['Starts at level 80:', 'Read first:', 'Hellscream note:']
          for value in forbidden:
              assert value not in text, value
          assert text.count('server-behavior') == 4
          assert 'For raid bosses, reach 540 on the character sheet, then prioritize stamina and armor.' in text
          assert text.count('<details') == text.count('</details>')

      - name: Remove one-shot workflow and commit
        run: |
          rm .github/workflows/clean-quick-start-notices.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add guides/protection-paladin-pve-guide.html .github/workflows/clean-quick-start-notices.yml
          git commit -m "Clean up Quick Start notices"
          git push origin HEAD:${{ github.head_ref }}

# synchronize trigger
