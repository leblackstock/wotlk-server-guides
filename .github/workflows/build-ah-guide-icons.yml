name: Build AH guide icons

on:
  push:
    branches:
      - agent/add-ah-guide-icons

permissions:
  contents: write

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/add-ah-guide-icons
          fetch-depth: 0

      - name: Generate icons and update pages
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          ROOT = Path('.')
          ICON_DIR = ROOT / 'assets' / 'ah-guide-icons'
          ICON_DIR.mkdir(parents=True, exist_ok=True)

          guides = [
              ('guides/mining-smithing-ah-price-guide.html', 'mining-smithing', 'Mining + Smithing', '#f0c15a', '#72e3ff', '''
                <g fill="none" stroke="#f8fbff" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"><path d="M69 69 L176 176"/><path d="M64 77 L88 53 L103 68 L79 92 Z" fill="#d8ecff" stroke="#f8fbff"/><path d="M177 63 L193 79 L173 99 L157 83 Z" fill="#ffd56f"/><path d="M188 68 L204 52"/><path d="M168 88 L152 104"/></g><path d="M69 181 L181 69" stroke="#2a1b11" stroke-width="25" stroke-linecap="round"/><path d="M69 181 L181 69" stroke="#d18b42" stroke-width="15" stroke-linecap="round"/><path d="M153 58 Q185 48 205 69 Q182 95 151 86" fill="#9aa9b6" stroke="#eef7ff" stroke-width="8"/>
              '''),
              ('guides/blacksmithing-materials-ah-price-guide.html', 'blacksmithing', 'Blacksmithing', '#ff9c59', '#f0c15a', '''
                <path d="M60 151 H189 L177 178 H78 Z" fill="#93a5b3" stroke="#f4fbff" stroke-width="9"/><path d="M89 115 H160 Q176 115 186 128 L199 144 H57 L76 125 Q82 115 89 115 Z" fill="#6d7f8c" stroke="#eef7ff" stroke-width="9"/><path d="M99 86 H158 L168 107 H88 Z" fill="#ffbf65" stroke="#fff2c7" stroke-width="7"/><path d="M178 62 L198 82 L142 138 L122 118 Z" fill="#d7e4ec" stroke="#ffffff" stroke-width="8"/><path d="M121 119 L92 148" stroke="#7b421f" stroke-width="16" stroke-linecap="round"/><circle cx="103" cy="70" r="5" fill="#ffd56f"/><circle cx="75" cy="90" r="4" fill="#ff8e4c"/><circle cx="185" cy="112" r="4" fill="#ffd56f"/>
              '''),
              ('guides/engineering-materials-ah-price-guide.html', 'engineering', 'Engineering', '#72e3ff', '#b58cff', '''
                <circle cx="126" cy="128" r="58" fill="#26394b" stroke="#aeeeff" stroke-width="10"/><circle cx="126" cy="128" r="23" fill="#101b27" stroke="#e8fbff" stroke-width="9"/><g fill="#7bdfff" stroke="#eafcff" stroke-width="5"><path d="M118 52 H134 L141 75 H111 Z"/><path d="M118 181 H134 L141 204 H111 Z" transform="rotate(180 126 192.5)"/><path d="M52 120 V136 L75 143 V113 Z"/><path d="M181 120 V136 L204 143 V113 Z"/><path d="M72 72 L84 60 L105 71 L84 92 Z"/><path d="M168 72 L180 84 L169 105 L148 84 Z"/><path d="M72 184 L84 196 L105 185 L84 164 Z"/><path d="M168 184 L180 172 L169 151 L148 172 Z"/></g><path d="M161 67 Q189 48 207 73 L177 103 L154 80 Z" fill="#dbe7ef" stroke="#ffffff" stroke-width="7"/><path d="M160 93 L109 144" stroke="#bd7d45" stroke-width="14" stroke-linecap="round"/>
              '''),
              ('guides/jewelcrafting-gems-ah-price-guide.html', 'jewelcrafting', 'Jewelcrafting + Gems', '#a335ee', '#72e3ff', '''
                <path d="M128 45 L190 94 L167 180 L128 211 L89 180 L66 94 Z" fill="#7b2ed3" stroke="#f4dcff" stroke-width="9"/><path d="M128 45 L145 94 L128 211 L111 94 Z" fill="#a95cff" opacity=".85"/><path d="M66 94 H190 L167 180 H89 Z" fill="#4b8dff" opacity=".65"/><path d="M66 94 L111 94 L89 180 Z M190 94 L145 94 L167 180 Z" fill="#7de7ff" opacity=".55"/><path d="M128 45 L111 94 H145 Z" fill="#e8faff" opacity=".75"/><circle cx="177" cy="62" r="6" fill="#ffffff"/><path d="M177 45 V79 M160 62 H194" stroke="#ffffff" stroke-width="5" stroke-linecap="round"/>
              '''),
              ('guides/enchanting-mats-ah-price-guide.html', 'enchanting', 'Enchanting Materials', '#9c7dff', '#4ee6ff', '''
                <path d="M115 45 L151 57 L143 119 L174 151 L137 211 L95 178 L105 118 L78 91 Z" fill="#7c64ff" stroke="#e9e3ff" stroke-width="9"/><path d="M115 45 L124 121 L95 178 L105 118 Z" fill="#5fe2ff" opacity=".75"/><path d="M151 57 L124 121 L174 151 L143 119 Z" fill="#c69aff" opacity=".8"/><circle cx="66" cy="155" r="6" fill="#72e3ff"/><circle cx="187" cy="98" r="5" fill="#f0c15a"/><path d="M58 83 C83 58 91 48 104 48 M178 183 C195 166 202 149 201 131" fill="none" stroke="#d9faff" stroke-width="6" stroke-linecap="round" stroke-dasharray="2 14"/><path d="M57 154 C82 139 91 128 101 112" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round"/>
              '''),
              ('guides/alchemy-materials-ah-price-guide.html', 'alchemy', 'Alchemy Materials', '#58d48d', '#72e3ff', '''
                <path d="M108 45 H148 M118 45 V88 L76 162 Q69 178 82 190 Q95 203 113 203 H143 Q161 203 174 190 Q187 178 180 162 L138 88 V45" fill="none" stroke="#eafcff" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/><path d="M86 158 Q128 132 170 158 L181 177 Q183 191 164 199 H93 Q75 191 78 177 Z" fill="#41d88a" opacity=".9"/><circle cx="111" cy="170" r="7" fill="#e7fff1"/><circle cx="142" cy="153" r="5" fill="#c7fff1"/><circle cx="150" cy="181" r="4" fill="#ffffff"/><path d="M165 77 Q197 63 204 91 Q184 108 160 94 Q175 84 165 77 Z" fill="#8ee08e" stroke="#eaffea" stroke-width="6"/>
              '''),
              ('guides/herbalism-herbs-ah-price-guide.html', 'herbalism', 'Herbalism + Herbs', '#53d56c', '#f0c15a', '''
                <path d="M127 204 C124 157 125 111 129 58" stroke="#d8f7c9" stroke-width="10" stroke-linecap="round"/><path d="M124 84 Q83 49 58 83 Q84 120 124 105" fill="#49c75e" stroke="#dfffe2" stroke-width="8"/><path d="M130 104 Q176 61 202 98 Q176 137 130 126" fill="#55df7a" stroke="#e5ffe8" stroke-width="8"/><path d="M124 132 Q82 99 56 135 Q80 172 124 153" fill="#3fb95b" stroke="#dfffe2" stroke-width="8"/><path d="M131 151 Q174 119 199 155 Q174 191 132 174" fill="#69e68a" stroke="#effff0" stroke-width="8"/><circle cx="184" cy="62" r="6" fill="#f0c15a"/><path d="M184 47 V77 M169 62 H199" stroke="#fff2bd" stroke-width="4" stroke-linecap="round"/>
              '''),
              ('guides/inscription-materials-ah-price-guide.html', 'inscription', 'Inscription Materials', '#b589ff', '#f0c15a', '''
                <path d="M64 61 H164 Q179 61 179 76 V190 Q168 181 151 181 H64 Z" fill="#e3d2a5" stroke="#fff6d6" stroke-width="9"/><path d="M64 61 Q79 69 79 84 V196 Q67 188 55 188 V74 Q55 65 64 61 Z" fill="#b38f5a" stroke="#f5dfb2" stroke-width="7"/><path d="M100 97 H151 M100 120 H157 M100 143 H145" stroke="#7a5835" stroke-width="7" stroke-linecap="round"/><path d="M180 51 Q205 72 179 116 L152 163 L139 160 L145 146 L173 103 Q185 83 167 67 Z" fill="#c09cff" stroke="#f2e7ff" stroke-width="7"/><path d="M139 160 L130 180 L151 166" fill="#f0c15a" stroke="#fff1bd" stroke-width="5"/>
              '''),
              ('guides/tailoring-cloth-ah-price-guide.html', 'tailoring', 'Tailoring + Cloth', '#7d8dff', '#d7b8ff', '''
                <path d="M70 84 Q128 50 186 84 L174 172 Q128 201 82 172 Z" fill="#6f7ee8" stroke="#e8ecff" stroke-width="9"/><path d="M82 105 Q128 82 174 105 M86 132 Q128 112 170 132 M91 157 Q128 141 165 157" fill="none" stroke="#c7ceff" stroke-width="7" opacity=".75"/><circle cx="72" cy="181" r="24" fill="#b48cff" stroke="#f1e7ff" stroke-width="8"/><circle cx="72" cy="181" r="9" fill="#1b2440"/><path d="M94 179 C125 168 153 157 187 113" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round"/><path d="M186 113 L198 76" stroke="#cbd6df" stroke-width="8" stroke-linecap="round"/>
              '''),
              ('guides/skinning-leatherworking-materials-ah-price-guide.html', 'skinning-leatherworking', 'Skinning + Leatherworking', '#d08b4f', '#f0c15a', '''
                <path d="M82 55 Q109 72 128 55 Q147 72 174 55 L192 91 Q172 107 183 132 Q194 157 171 197 Q146 181 128 201 Q110 181 85 197 Q62 157 73 132 Q84 107 64 91 Z" fill="#9b5d2f" stroke="#f3d7b6" stroke-width="9"/><path d="M95 84 Q128 104 161 84 M91 128 Q128 147 165 128 M101 169 Q128 154 155 169" fill="none" stroke="#dca06d" stroke-width="7" opacity=".75"/><path d="M184 61 L204 81 L151 134 L131 114 Z" fill="#d7e2e8" stroke="#ffffff" stroke-width="7"/><path d="M132 115 L105 142" stroke="#6f3d21" stroke-width="15" stroke-linecap="round"/>
              '''),
              ('guides/fishing-cooking-materials-ah-price-guide.html', 'fishing-cooking', 'Fishing + Cooking', '#4cb7e9', '#ffb05d', '''
                <path d="M49 132 Q87 89 132 113 Q154 79 195 96 Q184 121 158 131 Q184 141 195 166 Q154 183 132 149 Q87 173 49 132 Z" fill="#58bce5" stroke="#eaf9ff" stroke-width="9"/><circle cx="83" cy="125" r="6" fill="#132536"/><path d="M109 132 Q132 117 153 132 Q132 147 109 132 Z" fill="#d6f6ff" opacity=".7"/><path d="M67 187 H167 Q184 187 184 170 V157 H52 V170 Q52 187 67 187 Z" fill="#66514b" stroke="#f1d5ca" stroke-width="8"/><path d="M184 166 H211" stroke="#cf8b4a" stroke-width="13" stroke-linecap="round"/><path d="M85 158 Q88 139 99 129 M123 158 Q126 140 137 130" stroke="#ffb05d" stroke-width="6" stroke-linecap="round" opacity=".8"/>
              '''),
              ('guides/cross-profession-materials-ah-price-guide.html', 'cross-profession', 'Cross-Profession Materials', '#72e3ff', '#caa7ff', '''
                <circle cx="128" cy="72" r="34" fill="#72e3ff" stroke="#eafdff" stroke-width="8"/><circle cx="82" cy="154" r="34" fill="#f0c15a" stroke="#fff3c4" stroke-width="8"/><circle cx="174" cy="154" r="34" fill="#b98cff" stroke="#f1e8ff" stroke-width="8"/><path d="M111 101 L96 126 M145 101 L160 126 M116 154 H140" stroke="#f6fbff" stroke-width="12" stroke-linecap="round"/><circle cx="128" cy="128" r="13" fill="#ffffff"/><path d="M128 48 V96 M58 154 H106 M150 154 H198" stroke="#ffffff" stroke-width="4" opacity=".65"/>
              '''),
              ('guides/drop-turn-in-quest-page-items-ah-price-guide.html', 'drop-turn-in', 'Drop Turn-In + Quest Pages', '#56d58f', '#f0c15a', '''
                <path d="M67 57 H158 Q177 57 177 76 V194 H86 Q67 194 67 175 Z" fill="#d8c58f" stroke="#fff2c7" stroke-width="9"/><path d="M67 57 Q83 65 83 82 V194" fill="#a7804b" stroke="#f0d6a7" stroke-width="7"/><path d="M102 91 H150 M102 116 H157 M102 141 H143" stroke="#79572f" stroke-width="7" stroke-linecap="round"/><circle cx="173" cy="159" r="38" fill="#44cb88" stroke="#e7fff4" stroke-width="9"/><path d="M157 159 L170 172 L192 145" fill="none" stroke="#ffffff" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
              '''),
              ('guides/gear-pattern-drops-ah-price-guide.html', 'gear-patterns', 'Gear Pattern Drops', '#9b7cff', '#72e3ff', '''
                <path d="M61 61 H191 V193 H61 Z" fill="#2d3a68" stroke="#dfe6ff" stroke-width="9"/><path d="M83 83 H169 V171 H83 Z" fill="none" stroke="#7fbfff" stroke-width="6" stroke-dasharray="8 7"/><path d="M100 109 Q128 84 156 109 L149 153 Q128 169 107 153 Z" fill="#8d9fb5" stroke="#f3f8ff" stroke-width="8"/><path d="M128 96 V153 M108 112 H148" stroke="#dfeaff" stroke-width="6" opacity=".65"/><path d="M172 49 L199 76 L157 118 L130 91 Z" fill="#d8e4eb" stroke="#ffffff" stroke-width="7"/><path d="M132 92 L103 121" stroke="#8a4f2f" stroke-width="15" stroke-linecap="round"/>
              '''),
              ('guides/utility-recipe-drops-ah-price-guide.html', 'utility-recipes', 'Utility Recipe Drops', '#72e3ff', '#f0c15a', '''
                <path d="M61 58 H164 Q182 58 182 76 V194 H61 Z" fill="#d7c690" stroke="#fff2c8" stroke-width="9"/><path d="M84 84 H157 M84 109 H145 M84 134 H154" stroke="#775a35" stroke-width="7" stroke-linecap="round"/><circle cx="162" cy="160" r="38" fill="#2a4052" stroke="#c9f4ff" stroke-width="8"/><circle cx="162" cy="160" r="14" fill="#101b25" stroke="#ffffff" stroke-width="7"/><g fill="#72e3ff"><rect x="156" y="111" width="12" height="18" rx="3"/><rect x="156" y="191" width="12" height="18" rx="3"/><rect x="113" y="154" width="18" height="12" rx="3"/><rect x="193" y="154" width="18" height="12" rx="3"/></g>
              '''),
              ('guides/consumable-misc-recipe-drops-ah-price-guide.html', 'consumable-recipes', 'Consumable + Misc Recipes', '#ff9a5e', '#8ee08e', '''
                <path d="M58 60 H169 Q186 60 186 77 V193 H58 Z" fill="#d7c28b" stroke="#fff1c5" stroke-width="9"/><path d="M82 86 H151 M82 111 H142 M82 136 H155" stroke="#76582f" stroke-width="7" stroke-linecap="round"/><path d="M150 89 H181 M160 89 V121 L137 164 Q131 176 141 185 Q150 193 163 193 H178 Q191 193 200 185 Q210 176 204 164 L181 121 V89" fill="none" stroke="#f5fbff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/><path d="M143 163 Q171 146 199 163 L205 177 Q202 191 184 193 H158 Q140 190 137 177 Z" fill="#ff8d58" opacity=".9"/><path d="M105 166 Q85 147 70 162 Q80 187 105 180 Q91 173 105 166 Z" fill="#75d77d" stroke="#edffef" stroke-width="6"/>
              '''),
          ]

          def make_svg(title, c1, c2, symbol):
              return f'''<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc"><title id="title">{title} Auction House guide icon</title><desc id="desc">Fantasy game-style icon for the {title} Auction House guide.</desc><defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#111a25"/><stop offset=".55" stop-color="#0a1119"/><stop offset="1" stop-color="#060a10"/></linearGradient><radialGradient id="glow" cx="50%" cy="42%" r="62%"><stop stop-color="{c1}" stop-opacity=".35"/><stop offset=".62" stop-color="{c2}" stop-opacity=".12"/><stop offset="1" stop-color="#000" stop-opacity="0"/></radialGradient><linearGradient id="rim" x1="0" y1="0" x2="1" y2="1"><stop stop-color="{c1}"/><stop offset=".55" stop-color="{c2}"/><stop offset="1" stop-color="{c1}"/></linearGradient><filter id="shadow" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="8" stdDeviation="7" flood-color="#000" flood-opacity=".7"/></filter><filter id="soft" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="6"/></filter></defs><rect x="7" y="7" width="242" height="242" rx="44" fill="#05080c" stroke="#263342" stroke-width="5"/><rect x="14" y="14" width="228" height="228" rx="38" fill="url(#bg)" stroke="url(#rim)" stroke-width="5"/><rect x="20" y="20" width="216" height="216" rx="33" fill="url(#glow)"/><ellipse cx="128" cy="182" rx="76" ry="30" fill="{c1}" opacity=".16" filter="url(#soft)"/><g filter="url(#shadow)">{symbol}</g><path d="M42 34 H177" stroke="#ffffff" stroke-opacity=".13" stroke-width="4" stroke-linecap="round"/><circle cx="213" cy="43" r="4" fill="{c2}" opacity=".85"/></svg>'''

          for filename, slug, title, c1, c2, symbol in guides:
              (ICON_DIR / f'{slug}.svg').write_text(make_svg(title, c1, c2, symbol), encoding='utf-8')

          css = '''.guide-card.has-guide-icon { display:grid; grid-template-columns:56px minmax(0,1fr); grid-template-rows:auto auto 1fr auto; column-gap:11px; align-items:start; }
          .guide-card-icon { grid-column:1; grid-row:1 / span 2; display:block; width:56px; height:56px; border:1px solid rgba(114,227,255,.22); border-radius:13px; background:#0a1017; box-shadow:0 7px 16px rgba(0,0,0,.28),0 0 13px rgba(114,227,255,.06); }
          .guide-card.has-guide-icon .badge { grid-column:2; grid-row:1; }
          .guide-card.has-guide-icon .guide-title { grid-column:2; grid-row:2; margin-top:5px; align-self:start; }
          .guide-card.has-guide-icon .guide-note { grid-column:1 / -1; grid-row:3; margin-top:12px; }
          .guide-card.has-guide-icon .guide-action { grid-column:1 / -1; grid-row:4; }
          .ah-guide-heading { display:grid; grid-template-columns:88px minmax(0,1fr); align-items:center; gap:16px; min-width:0; }
          .ah-guide-heading-copy { min-width:0; }
          .ah-guide-page-icon { display:block; width:88px; height:88px; border:1px solid rgba(114,227,255,.24); border-radius:19px; background:#0a1017; box-shadow:0 10px 22px rgba(0,0,0,.34),0 0 18px rgba(114,227,255,.08); }
          @media (max-width:600px) { .ah-guide-heading { grid-template-columns:64px minmax(0,1fr); gap:12px; } .ah-guide-page-icon { width:64px; height:64px; border-radius:15px; } .guide-card.has-guide-icon { grid-template-columns:50px minmax(0,1fr); } .guide-card-icon { width:50px; height:50px; border-radius:12px; } }
          '''
          (ROOT / 'assets' / 'ah-guide-icons.css').write_text(css, encoding='utf-8')

          index_path = ROOT / 'index.html'
          index = index_path.read_text(encoding='utf-8')
          if 'ah-guide-icons.css' not in index:
              index = index.replace('  <link rel="stylesheet" href="./assets/addon-catalog.css?v=20260722-addons-v1">\n', '  <link rel="stylesheet" href="./assets/addon-catalog.css?v=20260722-addons-v1">\n  <link rel="stylesheet" href="./assets/ah-guide-icons.css?v=20260724-ah-icons-v1">\n')
          for filename, slug, title, *_ in guides:
              href = './' + filename
              pattern = re.compile(rf'(<a class="guide-card)(" href="{re.escape(href)}">)')
              index, count = pattern.subn(rf'\1 has-guide-icon\2<img class="guide-card-icon" src="./assets/ah-guide-icons/{slug}.svg" width="56" height="56" alt="">', index, count=1)
              if count != 1:
                  raise SystemExit(f'index.html: could not decorate {href}')
          index_path.write_text(index, encoding='utf-8')

          for filename, slug, title, *_ in guides:
              path = ROOT / filename
              text = path.read_text(encoding='utf-8')
              if 'ah-guide-icons.css' not in text:
                  text = text.replace('</head>', '  <link rel="stylesheet" href="../assets/ah-guide-icons.css?v=20260724-ah-icons-v1">\n</head>', 1)
              if 'class="ah-guide-heading"' not in text:
                  pattern = re.compile(r'(<header[^>]*>\s*)(<h1[^>]*>.*?</h1>\s*<p class="sub">.*?</p>)', re.S)
                  replacement = rf'\1<div class="ah-guide-heading"><img class="ah-guide-page-icon" src="../assets/ah-guide-icons/{slug}.svg" width="88" height="88" alt=""><div class="ah-guide-heading-copy">\2</div></div>'
                  text, count = pattern.subn(replacement, text, count=1)
                  if count != 1:
                      raise SystemExit(f'{filename}: could not wrap header title and subtitle')
              path.write_text(text, encoding='utf-8')

          print(f'Created {len(guides)} guide icons and updated hub plus guide headers')
          PY

      - name: Validate output
        shell: bash
        run: |
          git diff --check
          test "$(find assets/ah-guide-icons -maxdepth 1 -name '*.svg' | wc -l)" -eq 16
          test "$(grep -R -l 'class="ah-guide-heading"' guides/*ah-price-guide.html | wc -l)" -eq 16
          test "$(grep -o 'class="guide-card has-guide-icon"' index.html | wc -l)" -eq 16

      - name: Commit generated icons
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/ah-guide-icons assets/ah-guide-icons.css index.html guides/*ah-price-guide.html
          git commit -m "feat: add AH guide icon set"
          git push origin HEAD:agent/add-ah-guide-icons
