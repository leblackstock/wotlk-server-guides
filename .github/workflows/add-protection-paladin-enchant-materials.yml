name: Add Protection Paladin enchant materials
on:
  pull_request:
    branches: [main]
    types: [opened, synchronize]
permissions:
  contents: write
jobs:
  update:
    if: github.head_ref == 'add-protection-paladin-enchant-materials'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Add expandable material and source notes
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import base64, json
          D=json.loads(base64.b64decode('').decode('utf-8'))
          CSS=base64.b64decode('').decode('utf-8')
          def details(items):
              rows=[]
              for name,mats,source,note,level in items:
                  rows.append(f'<div class="enchant-detail-item"><strong class="item-name q-rare">{name}</strong><span><b>Materials:</b> {mats}</span><span><b>Source:</b> {source} <em class="source-{level}">{note}</em></span></div>')
              return '<details class="enchant-details"><summary>Materials &amp; source</summary><div class="enchant-detail-body">'+''.join(rows)+'</div></details>'
          path=Path('guides/protection-paladin-pve-guide.html')
          text=path.read_text(encoding='utf-8')
          note='<p class="mini-note"><strong>Material note:</strong> Costs below use standard final-patch 3.3.5 recipes. Our server may change recipes, vendors, reputation rates, or drop rates. Crafted kits and attachments can usually be bought from another player; profession-only tinkers and linings require the profession on the character using them.</p>'
          anchor='<p class="mini-note rarity-note"><strong>Color key:</strong> named enchantments and attachments use the closest in-game item-quality color. Plain explanatory text remains neutral.</p>'
          if note not in text: text=text.replace(anchor,anchor+'\n    '+note,1)
          lines=text.splitlines()
          found=[]
          for i,line in enumerate(lines):
              for slot,items in D.items():
                  marker=f'<tr><td><strong>{slot}</strong></td>'
                  if marker in line:
                      if 'class="enchant-details"' not in line:
                          pos=line.rfind('</td></tr>')
                          if pos<0: raise SystemExit(f'Row end not found: {slot}')
                          line=line[:pos]+details(items)+line[pos:]
                      lines[i]=line; found.append(slot); break
          text='\n'.join(lines)+'\n'
          if '/* Enchant material/source expanders. */' not in text:
              css_anchor='    @media (max-width: 1040px) {'
              if text.count(css_anchor)!=1: raise SystemExit('CSS anchor missing or duplicated')
              text=text.replace(css_anchor,CSS+css_anchor,1)
          text=text.replace('<stroong>Glyph of Blessing of Kings:</strong>','<strong>Glyph of Blessing of Kings:</strong>')
          if set(found)!=set(D) or text.count('class="enchant-details"')!=11 or text.count('<summary>Materials &amp; source</summary>')!=11: raise SystemExit(f'Validation failed: {found}')
          path.write_text(text,encoding='utf-8',newline='\n')
          PY
      - name: Commit guide update
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/add-protection-paladin-enchant-materials.yml .tmp/enchant-materials-trigger.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Add enchant materials and acquisition notes"
          git push origin HEAD:${{ github.head_ref }}
