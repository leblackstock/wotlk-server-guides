name: Add Tested Auctioneer Suite

on:
  push:
    branches:
      - agent/add-tested-auctioneer-suite
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  build-test-branch:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/add-tested-auctioneer-suite

      - name: Align migration with current browser tests
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path("scripts/apply-auctioneer-suite-catalog.py")
          lines = path.read_text(encoding="utf-8").splitlines()
          changed = 0
          for index, line in enumerate(lines):
              if line.strip().startswith("drawer_marker =") and "paladin-protection" in line:
                  lines[index] = '        drawer_marker = \'    assert.equal(await desktop.locator(\\\'a[href="https://warperia.com/addon-wotlk/chatter/"]\\\').count() > 0, true);\\n\''
                  changed += 1
              if "browser = replace_once(browser, drawer_marker, auctioneer_drawer + drawer_marker" in line:
                  lines[index] = '        browser = replace_once(browser, drawer_marker, drawer_marker + "\\n" + auctioneer_drawer, "browser drawer")'
                  changed += 1
          if changed != 2:
              raise SystemExit(f"Expected two browser-marker edits, found {changed}")
          path.write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

      - name: Apply Auctioneer Suite catalog migration
        run: |
          if ! python scripts/apply-auctioneer-suite-catalog.py >/tmp/auctioneer-migration.log 2>&1; then
            tail -n 60 /tmp/auctioneer-migration.log > auctioneer-migration-error.txt
            cat auctioneer-migration-error.txt
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add auctioneer-migration-error.txt
            git commit -m "chore: capture Auctioneer migration failure" || true
            git push origin HEAD:agent/add-tested-auctioneer-suite || true
            exit 1
          fi
          cat /tmp/auctioneer-migration.log

      - name: Build generated catalog data
        run: python scripts/build-addon-catalog.py

      - name: Validate catalog and search behavior
        run: |
          python scripts/validate-addon-catalog.py
          python scripts/build-addon-catalog.py --check
          node tests/addon-search.test.js
          git diff --check

      - name: Install temporary browser test tooling
        run: |
          npm init -y >/dev/null 2>&1
          npm install --no-save playwright@1.55.0 >/dev/null 2>&1
          npx playwright install chromium >/dev/null

      - name: Run browser smoke tests
        run: |
          python -m http.server 4173 >/tmp/addon-server.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID' EXIT
          sleep 2
          node tests/addon-browser-smoke.cjs

      - name: Commit tested permanent changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/addons.json assets/addon-catalog-data.js assets/addon-catalog.js assets/addon-catalog.css assets/addons/icons/auctioneer-suite.svg guides/addons.html scripts/validate-addon-catalog.py tests/addon-search.test.js tests/addon-browser-smoke.cjs
          if git diff --cached --quiet; then
            echo "No permanent changes to commit."
          else
            git commit -m "Add tested Auctioneer Suite with module map"
            git push origin HEAD:agent/add-tested-auctioneer-suite
          fi
