name: Split Tankadin guide into pages

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  split-guide:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Build coordinated Tankadin pages
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          from html.parser import HTMLParser
          import re

          source_path = Path('guides/protection-paladin-pve-guide.html')
          source = source_path.read_text(encoding='utf-8')

          style_match = re.search(r'<style>\s*(.*?)\s*</style>', source, flags=re.S | re.I)
          if not style_match:
              raise SystemExit('Could not find the existing Tankadin style block.')
          css = style_match.group(1).rstrip()

          css += r'''

          /* Multi-page Tankadin guide navigation. */
          .site-nav a[aria-current="page"] {
            border-color: var(--paladin);
            background: rgba(245, 140, 186, .14);
            color: #fff;
          }

          .page-kicker {
            display: block;
            margin-bottom: 5px;
            color: var(--paladin);
            font-size: 11px;
            font-weight: 900;
            letter-spacing: .10em;
            text-transform: uppercase;
          }

          .chapter-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
            margin-top: 14px;
          }

          .chapter-card {
            display: block;
            padding: 16px;
            border: 1px solid rgba(245, 140, 186, .25);
            border-radius: 14px;
            background: #121820;
            color: var(--muted);
            text-decoration: none;
          }

          .chapter-card:hover,
          .chapter-card:focus-visible {
            border-color: var(--paladin);
            background: rgba(245, 140, 186, .075);
            outline: none;
          }

          .chapter-number {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 26px;
            height: 26px;
            margin-bottom: 9px;
            border-radius: 50%;
            background: var(--paladin);
            color: #1a0d13;
            font-size: 12px;
            font-weight: 900;
          }

          .chapter-card h3 {
            margin: 0 0 5px;
            color: #fff;
            font-size: 18px;
          }

          .chapter-card p {
            margin: 0;
            color: var(--muted);
            font-size: 13px;
          }

          .chapter-topics {
            display: block;
            margin-top: 9px;
            color: var(--paladin-soft);
            font-size: 12px;
            font-weight: 800;
          }

          .page-pager {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin: 18px 0 0;
          }

          .page-pager a {
            flex: 1 1 0;
            padding: 11px 12px;
            border: 1px solid rgba(245, 140, 186, .26);
            border-radius: 11px;
            background: rgba(245, 140, 186, .055);
            color: var(--paladin-soft);
            text-decoration: none;
            font-size: 13px;
            font-weight: 900;
          }

          .page-pager a:last-child { text-align: right; }
          .page-pager a:hover,
          .page-pager a:focus-visible {
            border-color: var(--paladin);
            background: rgba(245, 140, 186, .11);
            outline: none;
          }

          .guide-scope {
            margin-top: 12px;
            color: var(--muted);
            font-size: 12px;
          }

          @media (max-width: 680px) {
            .chapter-grid { grid-template-columns: 1fr; }
            .page-pager { flex-direction: column; }
            .page-pager a:last-child { text-align: left; }
          }
          /* End multi-page Tankadin guide navigation. */
          '''

          Path('assets/protection-paladin.css').write_text(css.strip() + '\n', encoding='utf-8')

          def extract(tag: str, element_id: str) -> str:
              start_re = re.compile(rf'<{tag}\b[^>]*\bid=["\']{re.escape(element_id)}["\'][^>]*>', re.I)
              match = start_re.search(source)
              if not match:
                  raise SystemExit(f'Missing {tag}#{element_id}')
              end_marker = f'</{tag}>'
              end = source.find(end_marker, match.end())
              if end < 0:
                  raise SystemExit(f'Missing closing {end_marker} for #{element_id}')
              return source[match.start():end + len(end_marker)].strip()

          def extract_sources() -> str:
              marker = source.find('Sources and scope')
              if marker < 0:
                  raise SystemExit('Missing Sources and scope section')
              start = source.rfind('<section class="common">', 0, marker)
              end = source.find('</section>', marker)
              if start < 0 or end < 0:
                  raise SystemExit('Could not isolate Sources and scope section')
              return source[start:end + len('</section>')].strip()

          sections = {
              'quick-start': extract('section', 'quick-start'),
              'rotation': extract('section', 'rotation'),
              'cooldowns': extract('section', 'cooldowns'),
              'talents': extract('section', 'talents'),
              'glyphs': extract('section', 'glyphs'),
              'macros': extract('section', 'macros'),
              'addons': extract('section', 'addons'),
              'stats': extract('section', 'stats'),
              'gearing-path': extract('section', 'gearing-path'),
              'gems': extract('section', 'gems'),
              'enchants': extract('section', 'enchants'),
              'professions': extract('section', 'professions'),
              'consumables': extract('section', 'consumables'),
              'encounter-tuning': extract('section', 'encounter-tuning'),
              'corrections': extract('details', 'corrections'),
              'sources': extract_sources(),
          }

          sections['rotation'] = sections['rotation'].replace(
              'Learn the ability groups even if you keep a helper macro.</div>',
              'Learn the ability groups even if you keep a helper macro. <a href="protection-paladin-setting-up.html#macros">Open the macro guide.</a></div>'
          )
          sections['corrections'] = sections['corrections'].replace(
              'The macro section above supplies corrected, copyable equivalents.',
              'The <a href="protection-paladin-setting-up.html#macros">macro section</a> supplies corrected, copyable equivalents.'
          )

          pages = [
              ('quick', 'protection-paladin-pve-guide.html', 'Quick Start'),
              ('playing', 'protection-paladin-playing.html', 'Playing'),
              ('setting', 'protection-paladin-setting-up.html', 'Setting up'),
              ('gearing', 'protection-paladin-gearing.html', 'Gearing'),
              ('raiding', 'protection-paladin-raiding.html', 'Raiding'),
          ]

          def guide_nav(current: str) -> str:
              links = [
                  ('quick', 'protection-paladin-pve-guide.html', 'Quick Start'),
                  ('playing', 'protection-paladin-playing.html', 'Playing'),
                  ('setting', 'protection-paladin-setting-up.html', 'Setting up'),
                  ('gearing', 'protection-paladin-gearing.html', 'Gearing'),
                  ('raiding', 'protection-paladin-raiding.html', 'Raiding'),
              ]
              items = ['    <a href="../index.html">Guide Hub</a>']
              for key, href, label in links:
                  current_attr = ' aria-current="page"' if key == current else ''
                  items.append(f'    <a href="{href}"{current_attr}>{label}</a>')
              return '<nav class="site-nav" aria-label="Tankadin guide pages">\n' + '\n'.join(items) + '\n  </nav>'

          def local_nav(items: list[tuple[str, str]]) -> str:
              links = ''.join(f'      <a href="#{anchor}">{label}</a>\n' for anchor, label in items)
              return f'''    <div class="jump-nav" aria-label="Topics on this page">\n{links}    </div>'''

          def pager(previous: tuple[str, str] | None, following: tuple[str, str] | None) -> str:
              links = []
              if previous:
                  links.append(f'<a href="{previous[0]}">← {previous[1]}</a>')
              else:
                  links.append('<span></span>')
              if following:
                  links.append(f'<a href="{following[0]}">{following[1]} →</a>')
              else:
                  links.append('<span></span>')
              return '<nav class="page-pager" aria-label="Previous and next guide pages">' + ''.join(links) + '</nav>'

          def shell(*, key: str, title: str, description: str, body: str, topics=None, script='') -> str:
              topics_html = local_nav(topics) if topics else ''
              return f'''<!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <meta name="description" content="{description}">
            <title>{title} | WotLK 3.3.5 Protection Paladin</title>
            <link rel="stylesheet" href="../assets/style.css">
            <link rel="stylesheet" href="../assets/protection-paladin.css">
          </head>
          <body>
          <div class="wrap">
            {guide_nav(key)}

            <header>
              <span class="page-kicker">Protection Paladin • Level 80+</span>
              <h1>WotLK 3.3.5 <span>{title}</span></h1>
              <p class="sub">{description}</p>
          {topics_html}
            </header>

            <main>
          {body}
            </main>

            <footer>Unofficial player-made WotLK 3.3.5 guide • <span class="footer-pink">Protection Paladin</span> • Updated July 18, 2026</footer>
          </div>
          {script}
          </body>
          </html>
          '''

          chapter_cards = '''<section class="common" id="guide-pages">
            <h2><span class="section-mark">◆</span> Continue the Tankadin guide</h2>
            <p class="muted">Use these pages in order while learning, then jump directly to the page you need later.</p>
            <div class="chapter-grid">
              <a class="chapter-card" href="protection-paladin-playing.html">
                <span class="chapter-number">1</span>
                <h3>Playing your Tankadin</h3>
                <p>Moment-to-moment tanking: 969, pulling, cooldowns, seals, and utility.</p>
                <span class="chapter-topics">969 • Pulls • Cooldowns • Seals</span>
              </a>
              <a class="chapter-card" href="protection-paladin-setting-up.html">
                <span class="chapter-number">2</span>
                <h3>Setting up your Tankadin</h3>
                <p>Build the character and interface you will use in combat.</p>
                <span class="chapter-topics">Talents • Glyphs • Macros • Addons</span>
              </a>
              <a class="chapter-card" href="protection-paladin-gearing.html">
                <span class="chapter-number">3</span>
                <h3>Gearing your Tankadin</h3>
                <p>Move from fresh level 80 to reliable raid and encounter sets.</p>
                <span class="chapter-topics">Stats • Gear path • Gems • Enchants • Professions</span>
              </a>
              <a class="chapter-card" href="protection-paladin-raiding.html">
                <span class="chapter-number">4</span>
                <h3>Raiding with your Tankadin</h3>
                <p>Prepare consumables and tune your choices for the encounter.</p>
                <span class="chapter-topics">Consumables • Encounter tuning • Hellscream tests</span>
              </a>
            </div>
          </section>'''

          quick_intro = '''<div class="note paladin"><strong>Starts at level 80:</strong> This guide begins when your Paladin reaches level 80. It does not cover leveling builds or low-level dungeon progression.</div>

            <div class="note paladin"><strong>Read first:</strong> For raid bosses, reach <strong>540 Defense skill</strong> before optimizing anything else. After that, build enough health and armor to survive the next hit.</div>

            <div class="note warning"><strong>Hellscream note:</strong> Proc enchants, taunt hit rules, set bonuses, boss parry-haste, and some scripted abilities can differ. Standard 3.3.5 behavior is listed; test anything suspicious before rebuilding a set around it.</div>'''

          quick_body = '\n\n'.join([
              quick_intro,
              sections['quick-start'],
              chapter_cards,
              sections['corrections'],
              sections['sources'],
          ])
          quick_html = shell(
              key='quick',
              title='Tankadin Quick Start',
              description='Start here after reaching level 80, learn the essentials, then choose the focused Tankadin page you need.',
              body=quick_body,
          )

          playing_body = '\n\n'.join([
              sections['rotation'],
              sections['cooldowns'],
              pager(('protection-paladin-pve-guide.html', 'Quick Start'), ('protection-paladin-setting-up.html', 'Setting up your Tankadin')),
          ])
          playing_html = shell(
              key='playing',
              title='Playing your Tankadin',
              description='Pull cleanly, maintain the 969 rhythm, and use Paladin cooldowns, seals, and utility deliberately.',
              topics=[('rotation', '969 rotation'), ('cooldowns', 'Cooldowns, seals & utility')],
              body=playing_body,
          )

          copy_script = '''<script>
            document.querySelectorAll("[data-copy]").forEach(function (button) {
              button.addEventListener("click", function () {
                var target = document.getElementById(button.getAttribute("data-copy"));
                if (!target || !navigator.clipboard) return;
                navigator.clipboard.writeText(target.innerText).then(function () {
                  var original = button.textContent;
                  button.textContent = "Copied";
                  setTimeout(function () { button.textContent = original; }, 1200);
                });
              });
            });
          </script>'''
          setting_body = '\n\n'.join([
              sections['talents'],
              sections['glyphs'],
              sections['macros'],
              sections['addons'],
              pager(('protection-paladin-playing.html', 'Playing your Tankadin'), ('protection-paladin-gearing.html', 'Gearing your Tankadin')),
          ])
          setting_html = shell(
              key='setting',
              title='Setting up your Tankadin',
              description='Choose the talents, glyphs, macros, and addons that support reliable Protection Paladin play.',
              topics=[('talents', 'Talents'), ('glyphs', 'Glyphs'), ('macros', 'Macros'), ('addons', 'Addons')],
              body=setting_body,
              script=copy_script,
          )

          gearing_body = '\n\n'.join([
              sections['stats'],
              sections['gearing-path'],
              sections['gems'],
              sections['enchants'],
              sections['professions'],
              pager(('protection-paladin-setting-up.html', 'Setting up your Tankadin'), ('protection-paladin-raiding.html', 'Raiding with your Tankadin')),
          ])
          gearing_html = shell(
              key='gearing',
              title='Gearing your Tankadin',
              description='Build a dependable level-80 tank set, understand the caps, and choose gems, enchants, and professions with purpose.',
              topics=[('stats', 'Stats & caps'), ('gearing-path', 'Gearing path'), ('gems', 'Gems'), ('enchants', 'Enchants'), ('professions', 'Professions')],
              body=gearing_body,
          )

          raiding_body = '\n\n'.join([
              sections['consumables'],
              sections['encounter-tuning'],
              pager(('protection-paladin-gearing.html', 'Gearing your Tankadin'), ('protection-paladin-pve-guide.html', 'Back to Quick Start')),
          ])
          raiding_html = shell(
              key='raiding',
              title='Raiding with your Tankadin',
              description='Prepare consumables, recognize encounter demands, and test Hellscream-specific behavior without importing another server’s raid meta.',
              topics=[('consumables', 'Consumables'), ('encounter-tuning', 'Encounter tuning')],
              body=raiding_body,
          )

          outputs = {
              Path('guides/protection-paladin-pve-guide.html'): quick_html,
              Path('guides/protection-paladin-playing.html'): playing_html,
              Path('guides/protection-paladin-setting-up.html'): setting_html,
              Path('guides/protection-paladin-gearing.html'): gearing_html,
              Path('guides/protection-paladin-raiding.html'): raiding_html,
          }
          for path, text in outputs.items():
              path.write_text(text.strip() + '\n', encoding='utf-8')

          class Validator(HTMLParser):
              def __init__(self):
                  super().__init__()
                  self.ids = []
                  self.hrefs = []
              def handle_starttag(self, tag, attrs):
                  attrs = dict(attrs)
                  if 'id' in attrs:
                      self.ids.append(attrs['id'])
                  if tag == 'a' and 'href' in attrs:
                      self.hrefs.append(attrs['href'])

          expected_ids = {
              'protection-paladin-pve-guide.html': {'quick-start', 'guide-pages', 'corrections'},
              'protection-paladin-playing.html': {'rotation', 'cooldowns'},
              'protection-paladin-setting-up.html': {'talents', 'glyphs', 'macros', 'addons'},
              'protection-paladin-gearing.html': {'stats', 'gearing-path', 'gems', 'enchants', 'professions'},
              'protection-paladin-raiding.html': {'consumables', 'encounter-tuning'},
          }
          generated_names = set(expected_ids)
          for path, text in outputs.items():
              parser = Validator()
              parser.feed(text)
              if len(parser.ids) != len(set(parser.ids)):
                  raise SystemExit(f'Duplicate IDs in {path}')
              missing = expected_ids[path.name] - set(parser.ids)
              if missing:
                  raise SystemExit(f'Missing IDs in {path}: {sorted(missing)}')
              for href in parser.hrefs:
                  if href.startswith('#') and href[1:] not in parser.ids:
                      raise SystemExit(f'Broken local link {href} in {path}')
                  if href.endswith('.html') and '/' not in href and '#' not in href and href not in generated_names:
                      raise SystemExit(f'Unknown generated-page link {href} in {path}')
                  if '.html#' in href:
                      target_name, target_id = href.split('#', 1)
                      if target_name in expected_ids and target_id not in expected_ids[target_name]:
                          raise SystemExit(f'Broken cross-page link {href} in {path}')
              if '<style>' in text or 'chapter-divider' in text:
                  raise SystemExit(f'Old all-in-one styling leaked into {path}')
              for required in ('Quick Start', 'Playing', 'Setting up', 'Gearing', 'Raiding'):
                  if f'>{required}</a>' not in text:
                      raise SystemExit(f'Missing page navigation item {required} in {path}')

          all_section_ids = [sid for ids in expected_ids.values() for sid in ids if sid != 'guide-pages']
          combined = '\n'.join(outputs[p] for p in outputs)
          for sid in all_section_ids:
              if combined.count(f'id="{sid}"') != 1:
                  raise SystemExit(f'Section #{sid} was not assigned exactly once')

          if source_path.read_text(encoding='utf-8') == source:
              raise SystemExit('Quick Start source page was not changed')
          print('Validated five Tankadin pages and shared stylesheet.')
          PY

      - name: Commit generated pages
        shell: bash
        run: |
          rm -f .github/workflows/split-tankadin-guide-pages.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/protection-paladin.css \
            guides/protection-paladin-pve-guide.html \
            guides/protection-paladin-playing.html \
            guides/protection-paladin-setting-up.html \
            guides/protection-paladin-gearing.html \
            guides/protection-paladin-raiding.html \
            .github/workflows/split-tankadin-guide-pages.yml
          git commit -m "Split Tankadin guide into focused pages"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
