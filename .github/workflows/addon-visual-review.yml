name: Addon Library Visual Review

on:
  pull_request:
    branches:
      - main
    types: [synchronize]

permissions:
  contents: read

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Install temporary browser
        run: |
          npm install --prefix /tmp/addon-visual playwright@1.54.1
          npx --prefix /tmp/addon-visual playwright install --with-deps chromium
      - name: Capture review screenshots
        env:
          NODE_PATH: /tmp/addon-visual/node_modules
        run: |
          python3 -m http.server 4173 >/tmp/addon-visual-http.log 2>&1 &
          SERVER_PID=$!
          trap 'kill "$SERVER_PID" 2>/dev/null || true' EXIT
          sleep 2
          mkdir -p /tmp/addon-screenshots
          node <<'NODE'
          const { chromium } = require('playwright');
          (async () => {
            const browser = await chromium.launch({ headless: true });
            const desktop = await browser.newPage({ viewport: { width: 1440, height: 1000 }, deviceScaleFactor: 1 });
            await desktop.goto('http://127.0.0.1:4173/guides/addons.html', { waitUntil: 'networkidle' });
            await desktop.screenshot({ path: '/tmp/addon-screenshots/desktop-default.png', fullPage: true });
            await desktop.goto('http://127.0.0.1:4173/guides/addons.html?class=paladin&spec=protection&role=tank', { waitUntil: 'networkidle' });
            await desktop.screenshot({ path: '/tmp/addon-screenshots/desktop-protection.png', fullPage: true });
            await desktop.goto('http://127.0.0.1:4173/guides/addons.html?class=paladin&spec=protection&role=tank#addon=healbot', { waitUntil: 'networkidle' });
            await desktop.screenshot({ path: '/tmp/addon-screenshots/desktop-healbot-dialog.png', fullPage: true });
            const mobile = await browser.newPage({ viewport: { width: 390, height: 844 }, isMobile: true, deviceScaleFactor: 1 });
            await mobile.goto('http://127.0.0.1:4173/guides/addons.html?class=paladin&spec=protection&role=tank', { waitUntil: 'networkidle' });
            await mobile.screenshot({ path: '/tmp/addon-screenshots/mobile-protection.png', fullPage: true });
            await mobile.goto('http://127.0.0.1:4173/guides/addons.html?class=paladin&spec=protection&role=tank#addon=healbot', { waitUntil: 'networkidle' });
            await mobile.screenshot({ path: '/tmp/addon-screenshots/mobile-healbot-dialog.png', fullPage: true });
            await browser.close();
          })().catch((error) => { console.error(error); process.exit(1); });
          NODE
      - uses: actions/upload-artifact@v4
        with:
          name: addon-visual-review
          path: /tmp/addon-screenshots/*.png
          retention-days: 1
