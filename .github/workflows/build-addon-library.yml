name: Build Addon Library

on:
  push:
    branches:
      - agent/addon-library-20260722
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  build-test-publish-branch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out current branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Apply integration to current repository state
        run: python3 scripts/implement-addon-library.py

      - name: Build generated browser data
        run: python3 scripts/build-addon-catalog.py

      - name: Validate catalog and site integration
        shell: bash
        run: |
          set -o pipefail
          {
            python3 scripts/validate-addon-catalog.py
            python3 scripts/build-addon-catalog.py --check
            python3 scripts/build-ah-search-index.py --check
            node tests/addon-search.test.js
            git diff --check
          } 2>&1 | tee /tmp/addon-validation.log

      - name: Preserve failed validation log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: addon-validation-log
          path: /tmp/addon-validation.log
          if-no-files-found: error
          retention-days: 1

      - name: Install temporary browser test tooling
        run: |
          npm install --prefix /tmp/addon-browser playwright@1.54.1
          npx --prefix /tmp/addon-browser playwright install --with-deps chromium

      - name: Run desktop and mobile browser smoke tests
        shell: bash
        env:
          NODE_PATH: /tmp/addon-browser/node_modules
        run: |
          set -o pipefail
          python3 -m http.server 4173 >/tmp/addon-library-http.log 2>&1 &
          SERVER_PID=$!
          trap 'kill "$SERVER_PID" 2>/dev/null || true' EXIT
          sleep 2
          node tests/addon-browser-smoke.cjs 2>&1 | tee /tmp/addon-browser-smoke.log

      - name: Preserve failed browser log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: addon-browser-log
          path: |
            /tmp/addon-browser-smoke.log
            /tmp/addon-library-http.log
          if-no-files-found: error
          retention-days: 1

      - name: Commit tested permanent implementation to branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            index.html \
            assets/guide-color-system.css \
            assets/addon-catalog.css \
            assets/addon-catalog.js \
            assets/addon-catalog-data.js \
            assets/addon-search-core.js \
            assets/addons/icons \
            data/addons.json \
            guides/addons.html \
            guides/protection-paladin-setting-up.html \
            internal/color-system.html \
            scripts/build-addon-catalog.py \
            scripts/validate-addon-catalog.py \
            tests/addon-search.test.js \
            tests/addon-browser-smoke.cjs
          git diff --cached --check
          git commit -m "Build WotLK addon library"
          git push origin HEAD:agent/addon-library-20260722
