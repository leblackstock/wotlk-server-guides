name: Force recover Protection Paladin guide

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  recover:
    if: github.head_ref == 'polish-protection-paladin-guide'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: polish-protection-paladin-guide
      - name: Decode and validate guide content
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          from html.parser import HTMLParser
          import base64
          import hashlib

          root = Path('.tmp/protection-paladin-guide')
          names = ['00.b64', '01.b64', '02.b64', '04.b64', '06.b64', '08.b64', '10.b64']
          encoded = ''.join(''.join((root / name).read_text(encoding='utf-8').split()) for name in names)
          data = base64.b64decode(encoded)
          text = data.decode('utf-8')
          HTMLParser().feed(text)
          required = [
              '<!DOCTYPE html>',
              '<section class="common" id="quick-start">',
              '<section class="common" id="macros">',
              'Macros: what to use, and when not to',
              'Optional two-button 969 helper',
              '<section class="common" id="addons">',
              '<details class="common correction-section" id="corrections">',
              'q-epic',
              'wow.zamimg.com/images/wow/icons/large/',
              '</html>',
          ]
          for token in required:
              if token not in text:
                  raise SystemExit(f'missing required guide content: {token}')
          if 'free 3% hit talent' in text.lower():
              raise SystemExit('unreliable hit-talent claim is present')
          target = Path('guides/protection-paladin-pve-guide.html')
          target.write_bytes(data)
          blob = hashlib.sha1(f'blob {len(data)}\0'.encode() + data).hexdigest()
          print(f'recovered_blob={blob}')
          print(f'bytes={len(data)}')
          PY
          rm -rf .tmp/protection-paladin-guide
          rm -f .github/workflows/assemble-protection-paladin-guide.yml
          rm -f .github/workflows/assemble-protection-paladin-guide-v2.yml
          rm -f .github/workflows/finalize-protection-guide.yml
          rm -f .github/workflows/recover-protection-guide.yml
          rm -f .github/workflows/force-recover-protection-guide.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Restore polished Protection Paladin guide"
          git push
