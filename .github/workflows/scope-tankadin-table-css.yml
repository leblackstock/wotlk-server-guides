name: Scope Tankadin table CSS

on:
  push:
    branches:
      - agent/scope-tankadin-table-css

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/scope-tankadin-table-css
          fetch-depth: 0

      - name: Scope Tankadin table selectors
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          css_path = Path('assets/protection-paladin.css')
          css = css_path.read_text(encoding='utf-8')

          rules = [
              (
                  r'(?m)^    table \{\n      width: 100%;\n      border-collapse: collapse;\n      min-width: 760px;\n    \}',
                  '    .table-wrap > table {\n      width: 100%;\n      border-collapse: collapse;\n      min-width: 760px;\n    }',
                  'base table',
              ),
              (
                  r'(?m)^    th, td \{\n      border-bottom: 1px solid var\(--line\);\n      padding: 10px 9px;\n      text-align: left;\n      vertical-align: top;\n    \}',
                  '    .table-wrap > table > thead > tr > th,\n    .table-wrap > table > tbody > tr > td {\n      border-bottom: 1px solid var(--line);\n      padding: 10px 9px;\n      text-align: left;\n      vertical-align: top;\n    }',
                  'cell pair',
              ),
              (
                  r'(?m)^    th \{\n      color: var\(--muted\);\n      font-size: 12px;\n      text-transform: uppercase;\n      letter-spacing: \.06em;\n      background: var\(--surface-table-head\);\n    \}',
                  '    .table-wrap > table > thead > tr > th {\n      color: var(--muted);\n      font-size: 12px;\n      text-transform: uppercase;\n      letter-spacing: .06em;\n      background: var(--surface-table-head);\n    }',
                  'header cells',
              ),
              (
                  r'(?m)^    td \{\n      color: var\(--muted\);\n      font-size: 13px;\n    \}',
                  '    .table-wrap > table > tbody > tr > td {\n      color: var(--muted);\n      font-size: 13px;\n    }',
                  'body cells',
              ),
              (
                  r'(?m)^    tr:last-child td \{ border-bottom: 0; \}',
                  '    .table-wrap > table > tbody > tr:last-child > td { border-bottom: 0; }',
                  'last row',
              ),
          ]

          for pattern, replacement, label in rules:
              css, count = re.subn(pattern, replacement, css, count=1)
              if count != 1:
                  raise SystemExit(f'Expected exactly one {label} rule, found {count}')

          forbidden = [
              r'(?m)^    table \{',
              r'(?m)^    th, td \{',
              r'(?m)^    th \{',
              r'(?m)^    td \{',
              r'(?m)^    tr:last-child td \{',
          ]
          for pattern in forbidden:
              if re.search(pattern, css):
                  raise SystemExit(f'Unscoped selector remains: {pattern}')

          css_path.write_text(css, encoding='utf-8', newline='')

          pages = [
              Path('guides/protection-paladin-pve-guide.html'),
              Path('guides/protection-paladin-playing.html'),
              Path('guides/protection-paladin-setting-up.html'),
              Path('guides/protection-paladin-gearing.html'),
              Path('guides/protection-paladin-gear-targets.html'),
              Path('guides/protection-paladin-raiding.html'),
          ]
          old = '../assets/protection-paladin.css?v=20260721-tooltip-colors-v2'
          new = '../assets/protection-paladin.css?v=20260724-tooltip-table-scope-v1'
          for page in pages:
              text = page.read_text(encoding='utf-8')
              if text.count(old) != 1:
                  raise SystemExit(f'{page}: expected exactly one old cache key')
              page.write_text(text.replace(old, new, 1), encoding='utf-8', newline='')

          print('Scoped Tankadin data tables and updated six cache keys')
          PY

      - name: Validate and commit
        shell: bash
        run: |
          git diff --check
          test "$(git diff --name-only | wc -l)" -eq 7
          test "$(git diff --name-only -- 'guides/protection-paladin*.html' | wc -l)" -eq 6
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/protection-paladin.css guides/protection-paladin*.html
          git commit -m "fix: scope Tankadin table styles"
          git push origin HEAD:agent/scope-tankadin-table-css
