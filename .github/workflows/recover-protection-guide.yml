name: Recover Protection Paladin guide

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  recover:
    if: github.head_ref == 'polish-protection-paladin-guide'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: polish-protection-paladin-guide
      - name: Recover exact validated guide
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import base64
          import hashlib

          root = Path('.tmp/protection-paladin-guide')
          parts = ['00.b64', '01.b64', '02.b64', '04.b64', '06.b64', '08.b64', '10.b64']
          encoded = ''.join(''.join((root / name).read_text(encoding='utf-8').split()) for name in parts)
          data = base64.b64decode(encoded, validate=True)
          actual = hashlib.sha1(f'blob {len(data)}\0'.encode() + data).hexdigest()
          expected = '3e451952b5a12309251b4f72cae85c8d3c9865d1'
          print(f'actual={actual}')
          print(f'expected={expected}')
          print(f'bytes={len(data)}')
          if actual != expected:
              raise SystemExit('recovered guide hash mismatch')
          Path('guides/protection-paladin-pve-guide.html').write_bytes(data)
          PY
          rm -rf .tmp/protection-paladin-guide
          rm -f .github/workflows/assemble-protection-paladin-guide.yml
          rm -f .github/workflows/assemble-protection-paladin-guide-v2.yml
          rm -f .github/workflows/finalize-protection-guide.yml
          rm -f .github/workflows/recover-protection-guide.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Restore validated Protection Paladin guide"
          git push
