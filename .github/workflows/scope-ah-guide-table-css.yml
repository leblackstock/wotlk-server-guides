name: Scope AH guide table CSS

on:
  push:
    branches:
      - agent/scope-ah-guide-table-css

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/scope-ah-guide-table-css
          fetch-depth: 0

      - name: Scope pricing table selectors
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          files = [
              "guides/alchemy-materials-ah-price-guide.html",
              "guides/blacksmithing-materials-ah-price-guide.html",
              "guides/consumable-misc-recipe-drops-ah-price-guide.html",
              "guides/cross-profession-materials-ah-price-guide.html",
              "guides/drop-turn-in-quest-page-items-ah-price-guide.html",
              "guides/enchanting-mats-ah-price-guide.html",
              "guides/engineering-materials-ah-price-guide.html",
              "guides/fishing-cooking-materials-ah-price-guide.html",
              "guides/gear-pattern-drops-ah-price-guide.html",
              "guides/herbalism-herbs-ah-price-guide.html",
              "guides/inscription-materials-ah-price-guide.html",
              "guides/jewelcrafting-gems-ah-price-guide.html",
              "guides/mining-smithing-ah-price-guide.html",
              "guides/skinning-leatherworking-materials-ah-price-guide.html",
              "guides/tailoring-cloth-ah-price-guide.html",
              "guides/utility-recipe-drops-ah-price-guide.html",
          ]

          required = [
              (
                  re.compile(r"(?<![\w.#>-])table\{width:100%;border-collapse:collapse;min-width:(\d+)px\}"),
                  r".table-wrap>table{width:100%;border-collapse:collapse;min-width:\1px}",
                  "base table",
              ),
              (
                  re.compile(r"(?<![\w.#>-])th,td\{border-bottom:"),
                  ".table-wrap>table>thead>tr>th,.table-wrap>table>tbody>tr>td{border-bottom:",
                  "cell pair",
              ),
              (
                  re.compile(r"(?<![\w.#>-])th\{color:"),
                  ".table-wrap>table>thead>tr>th{color:",
                  "header cells",
              ),
              (
                  re.compile(r"(?<![\w.#>-])tr:last-child td\{border-bottom:0\}"),
                  ".table-wrap>table>tbody>tr:last-child>td{border-bottom:0}",
                  "last row",
              ),
              (
                  re.compile(r"(?<![\w.#>-])td\{color:var\(--muted\)\}"),
                  ".table-wrap>table>tbody>tr>td{color:var(--muted)}",
                  "body cells",
              ),
          ]

          nth_pattern = re.compile(
              r"(?<![\w.#>-])th:nth-child\((\d+)\),td:nth-child\(\1\)\{"
          )

          changed = []
          for filename in files:
              path = Path(filename)
              text = path.read_text(encoding="utf-8")
              original = text

              for pattern, replacement, label in required:
                  text, count = pattern.subn(replacement, text, count=1)
                  if count != 1:
                      raise SystemExit(f"{filename}: expected exactly one {label} selector, found {count}")

              def scope_nth(match: re.Match[str]) -> str:
                  column = match.group(1)
                  return (
                      f".table-wrap>table>thead>tr>th:nth-child({column}),"
                      f".table-wrap>table>tbody>tr>td:nth-child({column}){{"
                  )

              text = nth_pattern.sub(scope_nth, text)

              if text == original:
                  raise SystemExit(f"{filename}: no changes made")
              path.write_text(text, encoding="utf-8", newline="")
              changed.append(filename)

          forbidden = [
              re.compile(r"(?<![\w.#>-])table\{width:100%;border-collapse:collapse;min-width:\d+px\}"),
              re.compile(r"(?<![\w.#>-])th,td\{border-bottom:"),
              re.compile(r"(?<![\w.#>-])tr:last-child td\{border-bottom:0\}"),
              re.compile(r"(?<![\w.#>-])td\{color:var\(--muted\)\}"),
          ]
          for filename in files:
              text = Path(filename).read_text(encoding="utf-8")
              for pattern in forbidden:
                  if pattern.search(text):
                      raise SystemExit(f"{filename}: unscoped pricing-table selector remains: {pattern.pattern}")
              if ".table-wrap>table{width:100%;border-collapse:collapse;min-width:" not in text:
                  raise SystemExit(f"{filename}: scoped base table selector missing")

          print(f"Scoped pricing-table CSS in {len(changed)} AH guides")
          PY

      - name: Validate changes
        shell: bash
        run: |
          git diff --check
          test "$(git diff --name-only -- 'guides/*ah-price-guide.html' | wc -l)" -eq 16

      - name: Commit scoped selectors
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add guides/*ah-price-guide.html
          git commit -m "fix: scope AH pricing table styles"
          git push origin HEAD:agent/scope-ah-guide-table-css
