name: Refine Tankadin page links

on:
  pull_request:
    types: [reopened]

permissions:
  contents: write

jobs:
  refine-links:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Remove dead styles and improve cross-page links
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          css_path = Path('assets/protection-paladin.css')
          css = css_path.read_text(encoding='utf-8')
          css, removed_chapter = re.subn(
              r'\n\s*\.chapter-divider\s*\{.*?\n\s*\.chapter-divider p\s*\{.*?\n\s*\}\n',
              '\n',
              css,
              count=1,
              flags=re.S,
          )
          css, removed_scope = re.subn(
              r'\n\s*\.guide-scope\s*\{.*?\n\s*\}\n',
              '\n',
              css,
              count=1,
              flags=re.S,
          )
          if removed_chapter != 1 or removed_scope != 1:
              raise SystemExit(f'Expected to remove one dead chapter block and one guide-scope block; got {removed_chapter}, {removed_scope}')
          css_path.write_text(css, encoding='utf-8')

          quick_path = Path('guides/protection-paladin-pve-guide.html')
          quick = quick_path.read_text(encoding='utf-8')
          old = 'Glyph of Divine Plea, Seal of Vengeance, and Righteous Defense are the safe all-purpose set.</div>'
          new = 'Glyph of Divine Plea, Seal of Vengeance, and Righteous Defense are the safe all-purpose set. <a href="protection-paladin-setting-up.html#glyphs">Open the glyph guide.</a></div>'
          if old not in quick:
              raise SystemExit('Quick Start glyph-summary text changed unexpectedly')
          quick_path.write_text(quick.replace(old, new, 1), encoding='utf-8')

          playing_path = Path('guides/protection-paladin-playing.html')
          playing = playing_path.read_text(encoding='utf-8')
          old = 'Best during tank swaps, transitions, or when you have a huge lead.</p>'
          new = 'Best during tank swaps, transitions, or when you have a huge lead. <a href="protection-paladin-setting-up.html#glyphs">Review the glyph choices.</a></p>'
          if old not in playing:
              raise SystemExit('Playing-page Salvation text changed unexpectedly')
          playing_path.write_text(playing.replace(old, new, 1), encoding='utf-8')

          raiding_path = Path('guides/protection-paladin-raiding.html')
          raiding = raiding_path.read_text(encoding='utf-8')
          old = 'Use Glyph of Righteous Defense and add only enough hit for the required reliability.'
          new = 'Use <a href="protection-paladin-setting-up.html#glyphs">Glyph of Righteous Defense</a> and add only enough hit for the required reliability.'
          if old not in raiding:
              raise SystemExit('Raiding-page taunt text changed unexpectedly')
          raiding_path.write_text(raiding.replace(old, new, 1), encoding='utf-8')

          checks = {
              'dead chapter CSS removed': '.chapter-divider' not in css,
              'unused guide-scope CSS removed': '.guide-scope' not in css,
              'Quick Start links to glyphs': 'protection-paladin-setting-up.html#glyphs' in quick_path.read_text(encoding='utf-8'),
              'Playing links to glyphs': 'protection-paladin-setting-up.html#glyphs' in playing_path.read_text(encoding='utf-8'),
              'Raiding links to glyphs': 'protection-paladin-setting-up.html#glyphs' in raiding_path.read_text(encoding='utf-8'),
          }
          failed = [name for name, passed in checks.items() if not passed]
          if failed:
              raise SystemExit('Failed checks: ' + ', '.join(failed))
          print('Final Tankadin link cleanup validated.')
          PY

      - name: Commit final cleanup
        shell: bash
        run: |
          rm -f .github/workflows/refine-tankadin-page-links.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/protection-paladin.css \
            guides/protection-paladin-pve-guide.html \
            guides/protection-paladin-playing.html \
            guides/protection-paladin-raiding.html \
            .github/workflows/refine-tankadin-page-links.yml
          git commit -m "Refine Tankadin page links"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
